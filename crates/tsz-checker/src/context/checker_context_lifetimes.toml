# CheckerContext field-lifetime manifest.
#
# Source of truth for `scripts/arch/checker_field_inventory.py`. Every field
# in `pub struct CheckerContext<'a>` MUST appear here with one of the lifetime
# classes documented in `docs/plan/PERFORMANCE_PLAN.md` §6:
#
#   ProgramStable     — immutable for one compilation/program version
#   WorkerReusable    — owned by one worker, reusable across file sessions
#   FileLocalReset    — initialized for one file, reset/dropped between files
#   SpeculationScoped — must roll back when speculation aborts
#   DiagnosticsOnly   — affects reporting/suppression, not type answers
#   LspPersistent     — survives requests, invalidated by document/version
#
# `Unknown` is intentionally unused: the inventory script fails CI on it.
#
# Classification policy for this initial pass (T2.1.A.1):
#
# 1. Borrowed `&'a` references and `Arc<...>`-wrapped shared structures
#    consumed by ProgramContext are `ProgramStable`.
# 2. Caches keyed by `NodeIndex` or `(u32, ...)` source positions are
#    `FileLocalReset` because raw indices collide across files (per
#    PERFORMANCE_PLAN.md §6 "Detailed Reset Hazards").
# 3. Diagnostic accumulators (`Vec<Diagnostic>`, position dedupe sets, error
#    tracking) are `DiagnosticsOnly` so the FileSession reset boundary owns
#    drainage.
# 4. Resolution stacks/sets that exist only to detect cycles within one file
#    check are `FileLocalReset`; the plan's §6 hazard table calls this out.
# 5. Depth counters (`Cell<u32>`, `RefCell<DepthCounter>`) are
#    `SpeculationScoped` because speculative overload/generic typing must
#    roll them back, otherwise TS2589-like behaviour can suppress real work.
# 6. Caches keyed by `SymbolId` could be safe across files (per §6: "symbol
#    type caches keyed by SymbolId are safe assuming stable symbol identity")
#    but we keep them `FileLocalReset` in this initial pass; promotion to
#    `ProgramStable` requires the audit listed in QueryCache Lifetime Audit.
#
# When a future PR reclassifies a field, update both the `lifetime` and the
# `reason` so the audit trail stays in the manifest. Don't reclassify without
# a clear justification — getting this wrong encodes correctness bugs into
# the architecture spec.

