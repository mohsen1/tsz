[package]
name = "tsz-checker"
description = "TypeScript type checker for the tsz compiler"
version.workspace = true
edition.workspace = true
autotests = false
repository.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []

[dependencies]
tsz-common = { workspace = true }
tsz-scanner = { workspace = true }
tsz-parser = { workspace = true }
tsz-binder = { workspace = true }
tsz-solver = { workspace = true }
tsz-lowering = { workspace = true }
rustc-hash = { workspace = true }
tracing = { workspace = true }
smallvec = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
globset = { workspace = true }
stacker = "0.1.23"
web-time = { workspace = true }

[[test]]
name = "ts2725_tests"
path = "tests/ts2725_tests.rs"

[[test]]
name = "ts2300_tests"
path = "tests/ts2300_tests.rs"

[[test]]
name = "jsx_component_attribute_tests"
path = "tests/jsx_component_attribute_tests.rs"

[[test]]
name = "type_alias_namespace_merge_tests"
path = "tests/type_alias_namespace_merge_tests.rs"

[[test]]
name = "ts2540_readonly_tests"
path = "tests/ts2540_readonly_tests.rs"

[[test]]
name = "control_flow_type_guard_tests"
path = "tests/control_flow_type_guard_tests.rs"

[lints]
workspace = true
