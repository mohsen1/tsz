# Cloud Build config for benchmark-prepare runs on the private
# `tsz-ci-build-pool` (e2-highcpu-32, 32 vCPU x 32 GiB, 200 GB SSD).

steps:
  - id: bench-prepare
    name: rust:1.95
    env:
      - 'BENCH_FULL=1'
      - 'BENCH_COLD=1'
      - 'BENCH_PGO=1'
      - 'BENCH_REQUIRE_PGO=1'
      - 'TSC_NPM_SPEC=6.0.2'
      - 'CARGO_BUILD_JOBS=32'
      - 'CARGO_INCREMENTAL=0'
      - 'RUST_MIN_STACK=16777216'
      - 'CARGO_TERM_COLOR=always'
      - 'TSZ_CI_SKIP_HOST_APT=1'
      - 'TSZ_CI_DISABLE_SCCACHE=1'
      - '_BENCH_TARGET_SHA=${_BENCH_TARGET_SHA}'
      - 'CARGO_HOME=/workspace/.ci-cache/cargo-home'
      - 'npm_config_cache=/workspace/.ci-cache/npm'
      - 'PNPM_STORE_DIR=/workspace/.ci-cache/pnpm-store'
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

      apt-get update
      apt-get install -y --no-install-recommends \
        bc \
        ca-certificates \
        curl \
        git \
        hyperfine \
        jq \
        pkg-config \
        xz-utils
      rm -rf /var/lib/apt/lists/*

      node_version="22.13.1"
      node_arch="x64"
      curl -fsSL "https://nodejs.org/dist/v${node_version}/node-v${node_version}-linux-${node_arch}.tar.xz" \
        | tar -xJ -C /usr/local --strip-components=1

      # Cloud Build source archives do not include `.git`, but the benchmark
      # prep fingerprint uses `git ls-files` for tracked source inputs. Add
      # only source files so restored caches stay out of the synthetic index.
      git init --quiet
      git add -- \
        Cargo.lock \
        Cargo.toml \
        .cargo/config.toml \
        scripts/bench/project-fixtures.sh \
        scripts/bench/bench-vs-tsgo.sh
      find crates \( -name Cargo.toml -o -name '*.rs' \) -print0 | xargs -0 git add --

      rustup component add llvm-tools-preview

      if ! command -v pnpm >/dev/null 2>&1; then
        npm install -g pnpm --silent
      fi
      pnpm config set store-dir "${PNPM_STORE_DIR}"

      cargo --version
      rustc --version
      node --version
      npm --version
      pnpm --version
      hyperfine --version

      (
        while true; do
          echo "bench prepare cloudbuild heartbeat $(date -Is)"
          uptime || true
          free -h || true
          df -h || true
          ps -eo pid,ppid,%cpu,%mem,rss,cmd --sort=-rss 2>/dev/null | head -20 || true
          sleep 30
        done
      ) &
      monitor_pid=$!
      trap 'kill "$monitor_pid" 2>/dev/null || true' EXIT

      ./scripts/bench/bench-vs-tsgo.sh --prepare-only
      test -x .target-bench/dist/tsz
      test -f .target-bench/dist/.bench-pgo-optimized
      tar -cf bench-prep.tar .target-bench/tools .target-bench/dist
      {
        printf 'BENCH_TARGET_SHA=%s\n' "${_BENCH_TARGET_SHA}"
        printf 'BENCH_BUILD_DATE=%s\n' "$(date -u +%F)"
        printf 'BENCH_PGO_OPTIMIZED=1\n'
      } > bench-prep.env
      # Cloud Build has historically been inconsistent about substituting
      # custom variables inside artifact path globs. Keep the real SHA-scoped
      # path for direct GCS consumers, and mirror it to the literal path that
      # matches an unsubstituted artifact glob.
      literal_scoped_dir='bench-prep/${_BENCH_TARGET_SHA}'
      mkdir -p "bench-prep/${_BENCH_TARGET_SHA}" "${literal_scoped_dir}" bench-prep/latest
      cp bench-prep.tar bench-prep.env "bench-prep/${_BENCH_TARGET_SHA}/"
      cp bench-prep.tar bench-prep.env "${literal_scoped_dir}/"
      cp bench-prep.tar bench-prep.env bench-prep/latest/

      gcs_access_token="$(
        curl -fsSL \
          -H 'Metadata-Flavor: Google' \
          'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' |
          jq -r '.access_token'
      )"
      if [[ -z "${gcs_access_token}" || "${gcs_access_token}" == "null" ]]; then
        echo "Cloud Build metadata server did not return a GCS access token." >&2
        exit 1
      fi

      upload_gcs_object() {
        local source_file="$1"
        local object_name="$2"
        local encoded_object
        encoded_object="$(node -e 'process.stdout.write(encodeURIComponent(process.argv[1]))' "${object_name}")"
        curl --retry 3 --retry-delay 2 -fsS \
          -X POST \
          -H "Authorization: Bearer ${gcs_access_token}" \
          -H "Content-Type: application/octet-stream" \
          --data-binary "@${source_file}" \
          "https://storage.googleapis.com/upload/storage/v1/b/tsz-ci_cloudbuild/o?uploadType=media&name=${encoded_object}" \
          >/dev/null
      }

      upload_gcs_object bench-prep.tar "bench-prep/${_BENCH_TARGET_SHA}/bench-prep.tar"
      upload_gcs_object bench-prep.env "bench-prep/${_BENCH_TARGET_SHA}/bench-prep.env"
      upload_gcs_object bench-prep.tar "bench-prep/latest/bench-prep.tar"
      upload_gcs_object bench-prep.env "bench-prep/latest/bench-prep.env"

artifacts:
  objects:
    location: gs://tsz-ci_cloudbuild/
    paths:
      - bench-prep/${_BENCH_TARGET_SHA}/bench-prep.tar
      - bench-prep/${_BENCH_TARGET_SHA}/bench-prep.env
      - bench-prep/latest/bench-prep.tar
      - bench-prep/latest/bench-prep.env

substitutions:
  _BENCH_TARGET_SHA: unknown

options:
  pool:
    name: projects/tsz-ci/locations/us-central1/workerPools/tsz-ci-build-pool
  logging: GCS_ONLY

logsBucket: gs://tsz-ci_cloudbuild/cloudbuild-logs

timeout: 7200s
