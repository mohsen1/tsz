# =============================================================================
# TSZ Campaign Definitions — v3 (Post-93% Fingerprint Era)
# =============================================================================
#
# At 93.3% conformance (11741/12579), the remaining 838 failures are:
#   - 617 fingerprint-only (73.6%): right codes, wrong message/position/count
#   - 174 wrong-code: different error codes than tsc
#   - 44 crashes/all-missing: we emit 0, tsc expects diagnostics
#   - 3 false positives: we emit, tsc expects 0
#
# The v2 model focused on wrong-code drift and architecture campaigns.
# At 93.3%, FINGERPRINT PARITY is the dominant remaining problem:
#   ~310 tests: type display divergence (alias vs expansion, sig format)
#   ~130 tests: diagnostic count mismatch (over/under-emit same code)
#   ~90 tests: position/span targeting (wrong AST node)
#
# NEW MODEL (v3):
#   - 50% of agents on Tier 1 (fingerprint parity campaigns)
#   - 30% on Tier 2 (wrong-code campaigns)
#   - 20% on Tier 3 (subsystem/leaf)
#
# Campaigns define MISSIONS, not file ownership. Follow root causes across
# crate boundaries. Multi-crate changes are EXPECTED, not exceptional.
#
# KPIs (track these, not overall conformance %):
#   1. Fingerprint-only count (target: reduce from 617)
#   2. FP-only for TS2322+TS2345+TS2339 (target: reduce from 410)
#   3. Big3 wrong-code count (target: reduce from 71)
#   4. Crash count (target: 0)
#   5. Tests per fix commit (target: >1.0, currently 0.32)
#
# To see status: scripts/session/check-status.sh
# To start:      scripts/session/start-campaign.sh <campaign-name>
# To checkpoint:  scripts/session/campaign-checkpoint.sh <campaign> [--status|--init]
# KPI dashboard:  python3 scripts/conformance/query-conformance.py --dashboard
#
# =============================================================================

campaigns:

  # ===========================================================================
  # TIER 1 — FINGERPRINT PARITY (50% of agent capacity)
  # ===========================================================================
  # These are the highest-leverage campaigns. They address the 617 tests
  # (73.6% of remaining failures) that already emit the right error codes
  # but with wrong message text, position, or count.

  type-display-parity:
    tier: 1
    mission: >
      Make the tsz type printer match tsc's formatting choices in error
      messages. This is the single highest-impact campaign: ~310 fingerprint-only
      tests fail because error message text differs even though the error code,
      file, and often the position are correct.
    focus_codes: [TS2322, TS2345, TS2339, TS2741, TS2769, TS2416]
    kpi: "fingerprint-only count for TS2322+TS2345+TS2339 (target: reduce from 410)"
    research_command: |
      python3 scripts/conformance/query-conformance.py --fingerprint-only --code TS2322
      python3 scripts/conformance/query-conformance.py --fingerprint-only --code TS2345
      python3 scripts/conformance/query-conformance.py --fingerprint-only --code TS2339
      # Pick 10-15 test names, run with fingerprint detail:
      ./scripts/conformance/conformance.sh run --filter "test1|test2|test3" --verbose
    test_filter: ""
    entry_files:
      - crates/tsz-solver/src/display.rs
      - crates/tsz-solver/src/display/
      - crates/tsz-checker/src/error_reporter/
      - crates/tsz-checker/src/diagnostics/
    success_criteria:
      - "Fingerprint-only count for TS2322 reduced by 50%+"
      - "Type alias expansion matches tsc's display choices"
      - "Function signature display matches tsc format"
      - "Literal types preserved in error messages where tsc preserves them"
      - "Intersection/union display matches tsc's alias-vs-expansion policy"
    divergence_patterns:
      - "Alias vs expansion: tsz uses alias name, tsc expands (or vice versa)"
      - "Function sig: tsz shows full function type, tsc shows 'typeof foo'"
      - "Literal preservation: tsz widens literal to base type in messages"
      - "Intersection format: tsz expands named type to full object literal"
      - "Union display: tsz shows type alias, tsc shows union members"
      - "Generic instantiation: tsz shows different generic parameter in message"
    estimated_impact: "~310 tests (50% of fingerprint-only failures)"
    difficulty: medium
    note: >
      One printer fix can flip 50+ tests at once. Always measure batch impact
      after a fix. If your fix only affects 1 test, you're fixing a symptom.

  diagnostic-count:
    tier: 1
    mission: >
      Fix tests where tsz emits the right error codes but a different number
      of instances than tsc. Example: tsc emits 2x TS2322, we emit 3x (extra
      assignability check on destructuring default), or tsc emits 7x TS17009,
      we emit 5x (missing super-before-this checks).
    focus_codes: [TS2322, TS2345, TS2339, TS17009, TS2564, TS1264]
    kpi: "fingerprint-only count where instance counts differ per code"
    research_command: |
      python3 scripts/conformance/query-conformance.py --fingerprint-only
      # Run tests verbose to count diagnostics per code:
      ./scripts/conformance/conformance.sh run --filter "PATTERN" --verbose
    test_filter: ""
    entry_files:
      - crates/tsz-checker/src/error_reporter/
      - crates/tsz-checker/src/checkers/
      - crates/tsz-checker/src/assignability/
      - crates/tsz-checker/src/flow_analysis.rs
    success_criteria:
      - "Diagnostic count matches tsc for common patterns"
      - "No redundant elaboration/assignability checks"
      - "Super-before-this and control-flow checks cover all tsc cases"
    estimated_impact: "~130 tests (21% of fingerprint-only failures)"
    difficulty: medium
    note: >
      Group fixes by emission pattern, not by individual test. One suppression
      rule fix can affect 10-20 tests.

  # ===========================================================================
  # TIER 2 — WRONG-CODE CAMPAIGNS (30% of agent capacity)
  # ===========================================================================
  # These address tests where we emit different error codes than tsc.
  # Still important but now secondary to fingerprint parity.

  big3-unification:
    tier: 2
    mission: >
      Unify the relation kernel for TS2322/TS2339/TS2345. Route ALL
      assignment/call-arg/JSX-prop/destructuring/satisfies checks through
      the canonical relation boundary (query_boundaries/assignability).
      Delete checker-local re-derivations of EPC applicability, missing-property
      classification, weak-union decisions, and property-shape classification.
    focus_codes: [TS2322, TS2339, TS2345, TS2416, TS2769]
    kpi: "wrong-code count for TS2322+TS2339+TS2345 (target: reduce from 71)"
    research_command: |
      python3 scripts/conformance/query-conformance.py --dashboard
      python3 scripts/conformance/query-conformance.py --campaign big3
      python3 scripts/conformance/query-conformance.py --code TS2322
      python3 scripts/conformance/query-conformance.py --extra-code TS2322
    test_filter: "assignab|subtype|compat|union|intersection|generic|overload|property"
    entry_files:
      - crates/tsz-solver/src/subtype.rs
      - crates/tsz-solver/src/relations/
      - crates/tsz-solver/src/infer.rs
      - crates/tsz-solver/src/operations/generic_call.rs
      - crates/tsz-checker/src/assignability/
      - crates/tsz-checker/src/query_boundaries/assignability.rs
    success_criteria:
      - "All assignment checks route through query_boundaries/assignability"
      - "No checker-local EPC/missing-property/weak-union classification"
      - "TS2322+TS2339+TS2345 wrong-code count reduced by 50%+"
      - "Zero regressions in other diagnostic families"
    coordinate_on:
      - crates/tsz-solver/src/narrowing.rs
      - crates/tsz-checker/src/types/contextual_type.rs
    estimated_impact: 65 tests (27 TS2322 + 23 TS2339 + 21 TS2345 wrong-code)
    difficulty: hard
    subsumes: [generic-inference, subtype-relations, computed-types]

  narrowing-boundary:
    tier: 2
    mission: >
      Finish narrowing.rs as a boundary-clean module. Zero direct solver
      type-query calls from flow/control_flow/narrowing.rs. All predicate
      extraction, lazy-def resolution, return-type truthiness helpers, and
      type-parameter info queries must go through boundary helpers.
    focus_codes: [TS2322, TS2339, TS18048, TS2741, TS2532, TS2454]
    kpi: "direct solver query calls remaining in narrowing.rs (target: 0)"
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign narrowing-flow
      rg "type_queries\." crates/tsz-checker/src/flow/ --type rust -c
      rg "solver\." crates/tsz-checker/src/flow/ --type rust -c
    test_filter: "narrow|typeGuard|controlFlow|discriminat|assert|predicate|optional"
    entry_files:
      - crates/tsz-solver/src/narrowing.rs
      - crates/tsz-checker/src/flow_analysis.rs
      - crates/tsz-checker/src/state/flow/
      - crates/tsz-checker/src/flow/
      - crates/tsz-checker/src/query_boundaries/
    success_criteria:
      - "Zero direct solver type-query calls from narrowing code"
      - "Boundary helpers cover predicate extraction, lazy-def, truthiness"
      - "narrowing.rs re-added to architecture_contract_tests.rs"
    coordinate_on:
      - crates/tsz-solver/src/subtype.rs
    estimated_impact: 62 tests (narrowing-flow campaign)
    difficulty: hard

  request-transport:
    tier: 2
    mission: >
      Complete the TypingRequest migration. Push the request object through
      all hot paths. Eliminate raw contextual_type mutations from CheckerContext.
    focus_codes: [TS7006, TS2322, TS2345, TS2769]
    kpi: "count of raw contextual-state mutations outside TypingRequest (target: 0)"
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign contextual-typing
      rg "contextual_type\b" crates/tsz-checker/src/ --type rust -l
    test_filter: "contextual|callback|objectLiteral|restParam|spreadArg|generic"
    entry_files:
      - crates/tsz-checker/src/types/contextual_type.rs
      - crates/tsz-checker/src/context/mod.rs
      - crates/tsz-checker/src/context/core.rs
    success_criteria:
      - "All contextual-type flows use TypingRequest"
      - "Request-aware caches cover call inference, JSX props, JSX children"
    hot_paths_to_migrate:
      - "Call inference / contextual callbacks"
      - "JSX props and JSX children"
      - "JSDoc callback / typedef contextual typing"
      - "Object-literal callback transport"
    estimated_impact: 55 tests (contextual-typing campaign)
    difficulty: hard

  # ===========================================================================
  # TIER 3 — SUBSYSTEM & LEAF (20% of agent capacity)
  # ===========================================================================

  crash-zero:
    tier: 3
    mission: >
      Zero the crash budget. Crashes create fake "missing diagnostics" and
      corrupt measurement for all other campaigns.
    focus_codes: []
    kpi: "crash count (target: 0, currently 44)"
    research_command: |
      python3 scripts/conformance/query-conformance.py --dashboard
      python3 -c "
      import json
      with open('scripts/conformance/conformance-detail.json') as f:
          d = json.load(f)
      crashes = [(p, f) for p, f in d['failures'].items()
                 if not f.get('a') and f.get('e')]
      print(f'Likely crashes: {len(crashes)}')
      for p, f in sorted(crashes)[:20]:
          print(f'  {p.rsplit(\"/\",1)[-1]}  expected={f[\"e\"]}')
      "
    entry_files:
      - crates/tsz-solver/src/evaluate.rs
      - crates/tsz-solver/src/subtype.rs
      - crates/tsz-checker/src/context/
    estimated_impact: "44 tests + measurement cleanup for all campaigns"
    difficulty: medium

  diagnostic-position:
    tier: 3
    mission: >
      Fix fingerprint-only failures where the diagnostic position (line/column)
      differs from tsc. Common patterns: pointing to outer expression instead of
      inner literal, off-by-one line numbers, different elaboration depth.
    focus_codes: [TS2322, TS2345, TS2339]
    kpi: "fingerprint-only tests with position-only mismatch"
    research_command: |
      python3 scripts/conformance/query-conformance.py --fingerprint-only
      ./scripts/conformance/conformance.sh run --filter "PATTERN" --verbose
    entry_files:
      - crates/tsz-checker/src/error_reporter/
      - crates/tsz-checker/src/checkers/
    estimated_impact: "~90 tests (15% of fingerprint-only failures)"
    difficulty: medium

  parser-diagnostics:
    tier: 3
    mission: >
      Fix parser error recovery and TS1xxx diagnostic accuracy.
    focus_codes: [TS1005, TS1109, TS1128, TS1003, TS1002]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign parser-recovery
    entry_files:
      - crates/tsz-parser/src/
    estimated_impact: 45 tests
    difficulty: medium

  node-declaration-emit:
    tier: 3
    mission: >
      Fix Node/module-resolution/declaration-emit coordination. Owns resolver
      diagnostics, driver-provided per-file mode facts, package self-name and
      exports semantics.
    focus_codes: [TS2307, TS1192, TS2835, TS2823, TS1479, TS2883, TS5107, TS5101]
    kpi: "Node lane pass rate (dashboard KPI 3)"
    research_command: |
      python3 scripts/conformance/query-conformance.py --dashboard
      python3 scripts/conformance/query-conformance.py --campaign module-resolution
    test_filter: "node|nodenext|packageJson|exports|imports|resolutionMode|declarationEmit|symlink"
    entry_files:
      - crates/tsz-core/src/module_resolver/
      - crates/tsz-cli/src/driver/resolution.rs
      - crates/tsz-checker/src/declarations/import/
      - crates/tsz-emitter/src/declaration_emitter/
    estimated_impact: "~26 real tests (Node lane failures)"
    difficulty: medium

  false-positives:
    tier: 3
    mission: >
      Eliminate extra diagnostics we emit that tsc doesn't.
    focus_codes: [TS2322, TS2339, TS2345, TS5107]
    research_command: |
      python3 scripts/conformance/query-conformance.py --false-positives
      python3 scripts/conformance/query-conformance.py --one-extra
    entry_files:
      - crates/tsz-checker/src/error_reporter/
      - crates/tsz-checker/src/assignability/
    estimated_impact: "3 tests (almost eliminated)"
    difficulty: easy

  jsdoc-jsx-salsa:
    tier: 3
    mission: >
      Semantic integration for JSDoc, JSX, and Salsa. Broad consumers of
      shared solver/checker mechanics. Most improvements come from Tier 1/2.
    focus_codes: [TS2322, TS2339, TS2345, TS7006, TS2540, TS2657, TS17014, TS2741]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign jsdoc-jsx-salsa
    entry_files:
      - crates/tsz-checker/src/jsdoc/
      - crates/tsz-checker/src/checkers/jsx/
    estimated_impact: "Most improvements come from Tier 1/2 campaigns"
    difficulty: hard
    note: >
      Only work area-local gaps after Tier 1/2 progress stabilizes.

  # ===========================================================================
  # INTEGRATOR (1) — merge queue, no code changes
  # ===========================================================================

  integrator:
    mission: >
      PR-queue manager. Does NOT write code. Validates campaign branches
      against main and opens a pull request if conformance holds; rejects
      if regressions. Never pushes to main directly — merging into main
      happens through the GitHub PR review flow.
    role: integration
    loop_command: |
      /loop 30m run scripts/session/integrate.sh --auto && python3 scripts/conformance/query-conformance.py --dashboard
    entry_files: []
    estimated_impact: "Keeps main green"
