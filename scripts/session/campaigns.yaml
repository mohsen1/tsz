# =============================================================================
# TSZ Campaign Definitions
# =============================================================================
#
# Each campaign defines a MISSION — a diagnostic/semantic goal to achieve.
# Agents follow the root cause wherever it leads, across crate boundaries.
#
# File ownership is NOT enforced. Campaigns are organized by WHAT you're
# fixing, not WHERE the code lives. A false-positives fix might need solver
# changes. A narrowing fix might need checker changes. That's fine.
#
# The `entry_files` field suggests where to START looking, not where you
# must stay. The `coordinate_on` field lists files where another campaign
# is likely working — check git log before making large changes there.
#
# To see which campaigns are available vs claimed:
#   scripts/session/check-status.sh
#
# To start working on a campaign:
#   scripts/session/start-campaign.sh <campaign-name>
#
# To check/record session progress:
#   scripts/session/campaign-checkpoint.sh <campaign-name> [--status|--init]
#
# =============================================================================

campaigns:

  # ---------------------------------------------------------------------------
  # SOLVER CAMPAIGNS (3) — deep type computation work
  # ---------------------------------------------------------------------------

  generic-inference:
    mission: >
      Fix generic function call type parameter inference and instantiation.
      When tsc infers type params for generic calls and we get it wrong.
    focus_codes: [TS2345, TS2322, TS2769, TS7006]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign big3
      python3 scripts/conformance/query-conformance.py --code TS2769
      ./scripts/conformance/conformance.sh run --filter "generic" --verbose --max 20
    test_filter: "generic|typeArgument|callSignature|overload|infer"
    entry_files:
      - crates/tsz-solver/src/infer.rs
      - crates/tsz-solver/src/operations/generic_call.rs
      - crates/tsz-checker/src/types/function_type.rs
    coordinate_on:
      - crates/tsz-solver/src/subtype.rs  # subtype-relations campaign likely active
    estimated_impact: 120 tests
    difficulty: hard

  subtype-relations:
    mission: >
      Fix core subtype and assignability checks for unions, intersections,
      and structural object compatibility. The heart of TS2322.
    focus_codes: [TS2322, TS2345, TS2416]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign big3
      python3 scripts/conformance/query-conformance.py --code TS2322
      ./scripts/conformance/conformance.sh run --filter "assignability|subtype" --verbose --max 20
    test_filter: "assignab|subtype|compat|union.*assign|intersection.*assign"
    entry_files:
      - crates/tsz-solver/src/subtype.rs
      - crates/tsz-solver/src/relations/
      - crates/tsz-checker/src/assignability/
    coordinate_on:
      - crates/tsz-solver/src/infer.rs  # generic-inference campaign likely active
    estimated_impact: 150 tests
    difficulty: hard

  computed-types:
    mission: >
      Fix mapped type evaluation, conditional type distribution, template
      literal types, and keyof computation.
    focus_codes: [TS2322, TS2344, TS2536, TS2339]
    research_command: |
      python3 scripts/conformance/query-conformance.py --code TS2344
      ./scripts/conformance/conformance.sh run --filter "mapped|conditional|templateLiteral" --verbose --max 20
    test_filter: "mapped|conditional|templateLiteral|keyof"
    entry_files:
      - crates/tsz-solver/src/evaluate.rs
      - crates/tsz-solver/src/operations/mapped.rs
      - crates/tsz-solver/src/operations/conditional.rs
    estimated_impact: 80 tests
    difficulty: very-hard

  # ---------------------------------------------------------------------------
  # CHECKER/SOLVER BOUNDARY CAMPAIGNS (3) — orchestration + solver queries
  # ---------------------------------------------------------------------------

  contextual-typing:
    mission: >
      Fix contextual type inference: how expression types are inferred from
      surrounding context (callback params, object literals, rest params).
      Root cause often in solver's contextual type propagation, not just checker.
    focus_codes: [TS7006, TS2322, TS2345, TS2769]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign contextual-typing
      python3 scripts/conformance/query-conformance.py --code TS7006
      ./scripts/conformance/conformance.sh run --filter "contextual|callback" --verbose --max 20
    test_filter: "contextual|callback|objectLiteral|restParam|spreadArg"
    entry_files:
      - crates/tsz-checker/src/types/contextual_type.rs
      - crates/tsz-checker/src/types/computation/
      - crates/tsz-checker/src/state/type_analysis/
    estimated_impact: 130 tests
    difficulty: hard

  narrowing:
    mission: >
      Fix control flow analysis and type narrowing: typeof guards, instanceof,
      discriminated unions, truthiness, nullish checks, type predicates.
      May require solver, checker, or binder changes depending on root cause.
    focus_codes: [TS2322, TS2339, TS18048, TS2741, TS2532]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign narrowing-flow
      python3 scripts/conformance/query-conformance.py --code TS18048
      ./scripts/conformance/conformance.sh run --filter "narrow|typeGuard|controlFlow" --verbose --max 20
    test_filter: "narrow|typeGuard|controlFlow|discriminat|assert"
    entry_files:
      - crates/tsz-solver/src/narrowing.rs
      - crates/tsz-checker/src/flow_analysis.rs
      - crates/tsz-checker/src/state/flow/
    estimated_impact: 140 tests
    difficulty: hard

  property-resolution:
    mission: >
      Fix property access, index access, keyof resolution, and bracket
      notation on unions, intersections, and merged declaration shapes.
    focus_codes: [TS2339, TS7053, TS2536, TS2538]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign property-resolution
      python3 scripts/conformance/query-conformance.py --code TS2339
      ./scripts/conformance/conformance.sh run --filter "property|indexAccess|elementAccess" --verbose --max 20
    test_filter: "property|indexAccess|keyof|elementAccess|bracketNotation"
    entry_files:
      - crates/tsz-solver/src/operations/property.rs
      - crates/tsz-solver/src/operations/index.rs
      - crates/tsz-checker/src/types/property_access_type.rs
    estimated_impact: 100 tests
    difficulty: medium

  jsdoc-jsx-salsa:
    mission: >
      Treat JSDoc, JSX, and Salsa as one semantic integration campaign.
      These are not isolated feature islands: they are broad consumers of
      shared checker/solver mechanics around property writes, contextual
      typing transport, parser recovery, cross-module typedef resolution,
      JSX library-managed attributes, and JS open-world behavior.
    focus_codes: [TS2322, TS2339, TS2345, TS7006, TS2540, TS2657, TS17014, TS2741]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign jsdoc-jsx-salsa
      ./scripts/conformance/conformance.sh run --filter "jsdoc|jsx|salsa" --verbose --max 40
      rg -n "checkObjectDefineProperty|checkOtherObjectAssignProperty|typedefCrossModule3|typedefMultipleTypeParameters|tsxLibraryManagedAttributes|tsxReactComponentWithDefaultTypeParameter3|tsxErrorRecovery2|tsxFragmentErrors|moduleExportAssignment|thisPropertyAssignment|typeFromJSConstructor" scripts/conformance/conformance-baseline.txt scripts/conformance-last-run.txt crates/tsz-core/tests/conformance_snapshot.txt
    test_filter: "jsdoc|jsx|tsx|salsa|checkJs|LibraryManagedAttributes|typedef|thisProperty|moduleExport"
    entry_files:
      - crates/tsz-checker/src/jsdoc/
      - crates/tsz-checker/src/checkers/jsx/
      - crates/tsz-checker/src/state/type_analysis/
      - crates/tsz-checker/src/types/computation/
      - crates/tsz-checker/src/state/type_resolution/
      - crates/tsz-solver/src/contextual/
      - crates/tsz-solver/src/relations/subtype/
    coordinate_on:
      - crates/tsz-checker/src/types/computation/object_literal_context.rs  # overlaps with contextual-typing
      - crates/tsz-checker/src/checkers/property_checker.rs  # overlaps with property-resolution
      - crates/tsz-checker/src/state/type_analysis/computed_commonjs.rs  # overlaps with false-positives
    targets:
      - "JSDoc property/write semantics: checkObjectDefineProperty.ts and checkOtherObjectAssignProperty.ts"
      - "JSDoc cross-module typedefs: typedefCrossModule3.ts and typedefMultipleTypeParameters.ts"
      - "JSX semantic checking: tsxLibraryManagedAttributes.tsx and tsxReactComponentWithDefaultTypeParameter3.tsx"
      - "JSX parser recovery: tsxErrorRecovery2.tsx and tsxFragmentErrors.tsx"
      - "Salsa JS-open-world mismatches: moduleExportAssignment.ts, thisPropertyAssignment.ts, and typeFromJSConstructor.ts"
    estimated_impact: 252 tests
    difficulty: hard

  module-resolution:
    mission: >
      Fix NodeNext/package-exports/import-mode/declaration-emit coordination.
      This lane owns resolver diagnostics, driver-provided per-file mode facts,
      package self-name and exports semantics, and declaration-emit behaviors
      that depend on those facts. It is not the same as big3/core semantics work.
    focus_codes: [TS2307, TS2835, TS2792, TS1479, TS2883, TS5107]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign module-resolution
      python3 scripts/conformance/query-conformance.py --code TS2307
      python3 scripts/conformance/query-conformance.py --code TS2835
      ./scripts/conformance/conformance.sh run --filter "node|packageJson|exports|imports|declarationEmit" --verbose --max 20
    test_filter: "node|nodenext|packageJson|exports|imports|resolutionMode|declarationEmit|symlink"
    entry_files:
      - crates/tsz-core/src/module_resolver/
      - crates/tsz-cli/src/driver/resolution.rs
      - crates/tsz-cli/src/driver/check.rs
      - crates/tsz-checker/src/declarations/import/
      - crates/tsz-checker/src/state/type_resolution/module.rs
    coordinate_on:
      - crates/tsz-checker/src/context/mod.rs
      - crates/tsz-checker/src/context/core.rs
      - crates/tsz-emitter/src/declaration_emitter/
    estimated_impact: 60 tests
    difficulty: medium

  # ---------------------------------------------------------------------------
  # DIAGNOSTIC / PARSER CAMPAIGNS (2) — error accuracy
  # ---------------------------------------------------------------------------

  parser-diagnostics:
    mission: >
      Fix parser error recovery and TS1xxx diagnostic accuracy.
      Primarily parser work, but may touch scanner for tokenization edge cases.
    focus_codes: [TS1005, TS1109, TS1128, TS1003, TS1002]
    research_command: |
      python3 scripts/conformance/query-conformance.py --campaign parser-recovery
      ./scripts/conformance/conformance.sh run --filter "parser" --verbose --max 20
    test_filter: "parser|syntax|expected.*token"
    entry_files:
      - crates/tsz-parser/src/
    estimated_impact: 80 tests
    difficulty: medium

  false-positives:
    mission: >
      Eliminate extra diagnostics we emit that tsc doesn't. 193 tests where
      tsc expects 0 errors but we emit some. Root causes are typically in
      solver relations, checker assignability gates, or narrowing — not just
      in the error_reporter. Follow the root cause wherever it leads.
    focus_codes: [TS2322, TS2339, TS2345, TS5107]
    research_command: |
      python3 scripts/conformance/query-conformance.py --false-positives
      python3 scripts/conformance/query-conformance.py --one-extra
      python3 scripts/conformance/query-conformance.py --extra-code TS2322
    test_filter: ""  # cross-cutting — use research_command instead
    entry_files:
      - crates/tsz-checker/src/error_reporter/
      - crates/tsz-checker/src/assignability/
      - crates/tsz-solver/src/subtype.rs
      - crates/tsz-solver/src/narrowing.rs
    estimated_impact: 193 tests
    difficulty: medium

  # ---------------------------------------------------------------------------
  # PERFORMANCE CAMPAIGN (1) — speed and correctness under load
  # ---------------------------------------------------------------------------

  performance:
    mission: >
      Fix 8 ERROR benchmarks (crashes on generic functions, utility types,
      controlFlowArrays). Optimize slow paths: large union discrimination
      (5.12x), optional chains (3x), deep mapped types (1.5x).
    focus_codes: []
    research_command: |
      ./scripts/bench/bench-vs-tsgo.sh --json 2>/dev/null | python3 -c "
      import json,sys
      d=json.load(sys.stdin)
      for t in d.get('tests',[]):
        if t.get('status')=='error' or t.get('factor',0)>1.5:
          print(f\"{t['name']}: {t.get('status','slow')} ({t.get('factor','N/A')}x)\")
      "
    test_filter: ""
    entry_files: []  # varies — guided by profiling
    targets:
      - "Fix 8 ERROR benchmark cases (generic functions, utility types, controlFlowArrays)"
      - "Optimize conditionalTypeDiscriminatingLargeUnion (5.12x slower than tsgo)"
      - "Optimize optional-chain N=400 (3x slower than tsgo)"
      - "Optimize ts-essentials/xor.ts and paths.ts (2-3x slower)"
    estimated_impact: "0 conformance tests, but critical for 2x-faster-than-tsgo goal"
    difficulty: hard

  # ---------------------------------------------------------------------------
  # INTEGRATOR (1) — merge queue, no code changes
  # ---------------------------------------------------------------------------

  integrator:
    mission: >
      Merge queue manager. Does NOT write code. Validates campaign branches
      against main, merges if conformance holds, rejects if regressions.
      Runs via /loop. Updates conformance snapshots after merges.
    role: integration
    loop_command: "/loop 30m run scripts/session/integrate.sh --auto and report results"
    entry_files: []
    estimated_impact: "Keeps main green"
