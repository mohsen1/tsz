name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft, labeled]
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache
  _TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache
  TSZ_CI_RUNNER_LABEL: tsz-cloud-run

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      full_run: ${{ steps.gate.outputs.full_run }}
      rust_cache_refresh: ${{ steps.gate.outputs.rust_cache_refresh }}
      required_summary: ${{ steps.gate.outputs.required_summary }}
      unit_packages: ${{ steps.gate.outputs.unit_packages }}
    steps:
      - id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          should_run=true
          full_run=true
          required_summary=true
          rust_cache_refresh=false
          cache_key_changed=false
          unit_packages=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # The `labeled` event triggers on every label add. We only care
            # about the `ci-approved` label (used to opt fork PRs into CI).
            # For any other label, this would just duplicate the existing
            # CI run from the same SHA's open/sync events, so skip.
            if [[ "${{ github.event.action }}" == "labeled" \
                  && "${{ github.event.label.name }}" != "ci-approved" ]]; then
              # Skip the actual CI work — a non-ci-approved label add just
              # duplicates the existing CI run from the same SHA's open/sync
              # events. But KEEP required_summary=true so the CI Summary job
              # (the required-status-check name) still runs and passes via the
              # `should_run=false` short-circuit. Setting required_summary=false
              # here would rename the summary to "CI Light Summary", which
              # branch protection does not recognize → PR stays BLOCKED until
              # a non-label event fires.
              echo "Label '${{ github.event.label.name }}' is not 'ci-approved' — skipping redundant run."
              should_run=false
            fi
            if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
              # Draft PRs still run the light CI suite (lint, build, unit).
              # Heavy suites wait until the PR is marked ready for review.
              full_run=false
              required_summary=false
            fi
            # Docs-only PRs cannot affect cargo build/test/conformance, so
            # skip CI jobs when every changed path matches
            # one of the docs-only patterns. The gate job itself + the
            # ubuntu-latest "CI Summary" job still run, so any
            # required-status-checks for those names are satisfied — unlike
            # workflow-level `paths-ignore`, which skips the entire workflow
            # and leaves required checks pending forever (PR #1989).
            #
            # CI workflow files (`.github/workflows/*`), `Cargo.{toml,lock}`,
            # scripts, and `crates/**` source are NOT classified as docs and
            # continue to trigger the full suite. Renames are tracked via
            # the GitHub API's `previous_filename`, so a `foo.rs` → `foo.md`
            # rename is correctly classified as non-docs (the deleted .rs
            # source still requires a build).
            if [[ "$should_run" == "true" ]]; then
              all_paths=""
              page=1
              while :; do
                page_paths=$(gh api \
                  "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100&page=${page}" \
                  --jq '.[] | (.filename, (.previous_filename // empty))' \
                  2>/dev/null || true)
                if [[ -z "$page_paths" ]]; then break; fi
                all_paths+="${page_paths}"$'\n'
                # Stop early if we got fewer than 100 entries (last page).
                count=$(printf '%s\n' "$page_paths" | wc -l | tr -d ' ')
                if [[ "$count" -lt 100 ]]; then break; fi
                page=$((page + 1))
                # Safety bound: 30 pages = 3000 files, well past any real PR.
                if [[ "$page" -gt 30 ]]; then break; fi
              done
              if [[ -n "$all_paths" ]]; then
                non_docs=$(printf '%s\n' "$all_paths" \
                  | grep -vE '(^|/)[^/]+\.md$|^(LICENSE|CHANGELOG|CONTRIBUTING|CODE_OF_CONDUCT)([.-][^/]*)?$|^docs/|^\.gitignore$|^\.editorconfig$' \
                  || true)
                if [[ -z "$non_docs" ]]; then
                  echo "PR diff is docs-only — skipping CI jobs:"
                  printf '  %s\n' $(printf '%s\n' "$all_paths" | sort -u)
                  should_run=false
                fi
              fi
            fi
            # P4 — draft-phase fast-fail: narrow the unit job to the touched
            # crates' tests when the diff is safely localized. Ready-for-review
            # PRs always run the full unit suite (correctness gate); only draft
            # PRs use the narrow set.
            #
            # Narrowing is "safe" when EVERY changed file is either:
            #   * under `crates/<known-unit-crate>/src|tests|benches|examples/`
            #   * a `.md`/docs path (already filtered by docs-only above)
            # And NONE of these "blast-radius" paths is touched:
            #   * root `Cargo.{toml,lock}`, `.cargo/`, `rust-toolchain*`
            #   * `crates/*/Cargo.toml`, `crates/*/build.rs`
            #   * `scripts/ci/`, `.github/workflows/`
            #   * a non-unit-tested crate (tsz-cli, tsz-conformance, tsz-lowering,
            #     tsz-wasm, tsz-website) — these can transitively affect unit
            #     test behavior via integration points
            #
            # When a blast-radius path is touched, fall back to the full unit
            # suite even on drafts. Lint always runs across the full workspace
            # regardless, so compile breakage in any crate still surfaces fast.
            if [[ "$should_run" == "true" \
                  && "${{ github.event.pull_request.draft }}" == "true" \
                  && -n "$all_paths" ]]; then
              # Paths that force the full unit suite even on drafts.
              blast_paths=$(printf '%s\n' "$all_paths" \
                | grep -E '^(Cargo\.(lock|toml)|\.cargo/|rust-toolchain|scripts/ci/|\.github/workflows/|crates/[^/]+/(Cargo\.toml|build\.rs))' \
                || true)
              # Source under crates/<X>/, excluding the blast paths above.
              crate_paths=$(printf '%s\n' "$all_paths" \
                | grep -E '^crates/[^/]+/(src|tests|benches|examples)/' \
                || true)
              # Catch-all: anything else (root files, scripts/, TypeScript/, etc.)
              # not yet classified.
              other_paths=$(printf '%s\n' "$all_paths" \
                | grep -vE '(^|/)[^/]+\.md$|^(LICENSE|CHANGELOG|CONTRIBUTING|CODE_OF_CONDUCT)([.-][^/]*)?$|^docs/|^\.gitignore$|^\.editorconfig$|^crates/[^/]+/(src|tests|benches|examples)/|^Cargo\.(lock|toml)$|^\.cargo/|^rust-toolchain|^scripts/ci/|^\.github/workflows/|^crates/[^/]+/(Cargo\.toml|build\.rs)$' \
                || true)
              if [[ -z "$blast_paths" && -z "$other_paths" && -n "$crate_paths" ]]; then
                # Extract distinct crate names from the matching paths.
                touched_crates=$(printf '%s\n' "$crate_paths" \
                  | sed -E 's|^crates/([^/]+)/.*|\1|' \
                  | sort -u)
                known_unit_crates="tsz-common tsz-scanner tsz-parser tsz-binder tsz-solver tsz-checker tsz-emitter tsz-lsp tsz-core"
                all_known=true
                for crate in $touched_crates; do
                  case " $known_unit_crates " in
                    *" $crate "*) ;;
                    *) all_known=false; break;;
                  esac
                done
                if [[ "$all_known" == "true" ]]; then
                  unit_packages=$(printf '%s' "$touched_crates" | tr '\n' ' ' | sed 's/ *$//')
                  echo "P4 draft fast-fail: narrowing unit to: ${unit_packages}"
                  printf '  touched: %s\n' $(printf '%s\n' "$crate_paths" | sort -u)
                fi
              fi
              if [[ -z "$unit_packages" ]]; then
                reasons=""
                [[ -n "$blast_paths" ]] && reasons+="blast-radius paths touched; "
                [[ -n "$other_paths" ]] && reasons+="unclassified paths touched; "
                [[ -z "$crate_paths" && -z "$reasons" ]] && reasons="no crate source changes"
                echo "P4 draft fast-fail: NOT narrowing (${reasons:-no eligible crates})"
              fi
            fi
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              # Fork PRs cannot use self-hosted runners by default (untrusted
              # code on shared infra). A maintainer must add the
              # `ci-approved` label after reviewing the diff to opt the PR
              # into full CI. Without that label, only the lightweight
              # ubuntu-latest checks run, which means heavy regressions
              # (e.g. conformance) cannot be caught — which is exactly how
              # PR #1608 slipped 72 conformance regressions into main.
              has_label=$(gh api \
                "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
                --jq '.labels // [] | map(.name) | index("ci-approved") // empty' \
                2>/dev/null || true)
              if [[ -n "$has_label" ]]; then
                echo "Fork PR has ci-approved label — running full CI on self-hosted runners."
              else
                echo "Skipping self-hosted CI for fork PRs (add 'ci-approved' label to enable)."
                should_run=false
                required_summary=false
              fi
            fi
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Skip redundant main CI when the push is a PR merge already validated by PR CI.
            # Saves ~40+ runner-minutes per merge (32 conformance + lint + unit + wasm + emit shards).
            pr_number=""
            for attempt in 1 2 3 4 5 6; do
              pr_number=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
                --jq '.[0].number // empty' 2>/dev/null || true)
              if [[ -n "$pr_number" ]]; then
                if [[ "$attempt" -gt 1 ]]; then
                  echo "Commit association for PR #${pr_number} became visible on attempt ${attempt}."
                fi
                break
              fi
              if [[ "$attempt" -lt 6 ]]; then
                echo "Commit association for ${{ github.sha }} is not visible yet (attempt ${attempt}/6); retrying."
                sleep 5
              fi
            done
            if [[ -z "$pr_number" ]]; then
              commit_subject=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
                --jq '.commit.message | split("\n")[0]' 2>/dev/null || true)
              if [[ "$commit_subject" =~ \(\#([0-9]+)\) ]]; then
                pr_number="${BASH_REMATCH[1]}"
                echo "Commit subject references PR #${pr_number} — using it for main CI skip check"
              fi
            fi
            if [[ -n "$pr_number" ]]; then
              page=1
              while :; do
                page_paths=$(gh api \
                  "repos/${{ github.repository }}/pulls/${pr_number}/files?per_page=100&page=${page}" \
                  --jq '.[] | (.filename, (.previous_filename // empty))' \
                  2>/dev/null || true)
                if [[ -z "$page_paths" ]]; then break; fi
                cache_paths=$(printf '%s\n' "$page_paths" \
                  | grep -E '^(Cargo\.lock|Cargo\.toml|\.cargo/config\.toml)$' \
                  || true)
                if [[ -n "$cache_paths" ]]; then
                  echo "PR #${pr_number} changed CI cache-key inputs; running main CI to refresh shared Rust caches:"
                  printf '  %s\n' $(printf '%s\n' "$cache_paths" | sort -u)
                  cache_key_changed=true
                  rust_cache_refresh=true
                  break
                fi
                count=$(printf '%s\n' "$page_paths" | wc -l | tr -d ' ')
                if [[ "$count" -lt 100 ]]; then break; fi
                page=$((page + 1))
                if [[ "$page" -gt 30 ]]; then break; fi
              done
            fi
            if [[ -n "$pr_number" && "$cache_key_changed" != "true" ]]; then
              pr_head_sha=$(gh api "repos/${{ github.repository }}/pulls/${pr_number}" \
                --jq '.head.sha' 2>/dev/null || true)
              if [[ -n "$pr_head_sha" ]]; then
                latest_ci_run_id=""
                latest_ci_conclusion=""
                for attempt in 1 2 3 4 5 6; do
                  latest_ci_run=$(gh api \
                    "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${pr_head_sha}&event=pull_request&per_page=20" \
                    --jq '[.workflow_runs[] | select(.status == "completed")] | sort_by(.created_at) | last | [.id, .conclusion] | @tsv' \
                    2>/dev/null || true)
                  latest_ci_run_id=$(printf '%s' "${latest_ci_run}" | cut -f1)
                  latest_ci_conclusion=$(printf '%s' "${latest_ci_run}" | cut -f2)
                  if [[ -n "${latest_ci_conclusion}" ]]; then
                    break
                  fi
                  if [[ "$attempt" -lt 6 ]]; then
                    echo "No completed CI run for PR #${pr_number} head ${pr_head_sha} is visible yet (attempt ${attempt}/6); retrying."
                    sleep 5
                  fi
                done
                if [[ "${latest_ci_conclusion}" == "success" ]]; then
                  required_summary_passed=$(gh api \
                    "repos/${{ github.repository }}/actions/runs/${latest_ci_run_id}/jobs?per_page=100" \
                    --jq '[.jobs[] | select(.name == "CI Summary" and .conclusion == "success")] | length' \
                    2>/dev/null || echo "0")
                  if [[ "${required_summary_passed}" -gt 0 ]]; then
                    echo "Latest required PR CI summary for #${pr_number} head ${pr_head_sha} passed — skipping redundant main CI"
                    should_run=false
                  else
                    echo "Latest PR CI for #${pr_number} head ${pr_head_sha} passed without a required CI Summary — running main CI"
                  fi
                else
                  echo "Latest PR CI for #${pr_number} head ${pr_head_sha} is '${latest_ci_conclusion:-missing}' — running main CI"
                fi
              fi
            fi
          fi
          if [[ "$should_run" != "true" ]]; then
            full_run=false
          fi
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "full_run=${full_run}" >> "$GITHUB_OUTPUT"
          echo "rust_cache_refresh=${rust_cache_refresh}" >> "$GITHUB_OUTPUT"
          echo "required_summary=${required_summary}" >> "$GITHUB_OUTPUT"
          echo "unit_packages=${unit_packages}" >> "$GITHUB_OUTPUT"

  project-corpus-pr-body:
    name: project-corpus-pr-body
    needs: gate
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require project corpus impact fields for semantic PRs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          changed_paths=""
          page=1
          while :; do
            page_paths=$(gh api \
              "repos/${REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100&page=${page}" \
              --jq '.[] | (.filename, (.previous_filename // empty))' \
              2>/dev/null || true)
            if [[ -z "$page_paths" ]]; then break; fi
            changed_paths+="${page_paths}"$'\n'
            count=$(printf '%s\n' "$page_paths" | wc -l | tr -d ' ')
            if [[ "$count" -lt 100 ]]; then break; fi
            page=$((page + 1))
            if [[ "$page" -gt 30 ]]; then break; fi
          done

          semantic_paths=$(printf '%s\n' "$changed_paths" \
            | grep -E '^(crates/(tsz-(binder|checker|cli|core|emitter|lsp|parser|scanner|solver|transforms)|tsz-website)/|scripts/(bench|ci|conformance|emit|fourslash)/|\.github/workflows/bench\.yml|\.github/workflows/ci\.yml)' \
            || true)
          if [[ -z "$semantic_paths" ]]; then
            echo "No semantic, benchmark, or dashboard paths changed; project corpus fields are optional."
            exit 0
          fi

          body=$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '.body // ""')
          missing=()
          if ! grep -Eq '^##[[:space:]]+Project Corpus Impact[[:space:]]*$' <<<"$body"; then
            missing+=("## Project Corpus Impact")
          fi
          if ! grep -Eq '^[[:space:]]*-[[:space:]]*Row:[[:space:]]*[^[:space:]]+' <<<"$body"; then
            missing+=("- Row: <project row or n/a>")
          fi
          if ! grep -Eq '^[[:space:]]*-[[:space:]]*Bug family:[[:space:]]*[^[:space:]]+' <<<"$body"; then
            missing+=("- Bug family: <family or n/a>")
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "Semantic/project-corpus-affecting PRs must keep Track 1 impact metadata in the PR body."
            echo "Changed paths requiring the metadata:"
            printf '  %s\n' $(printf '%s\n' "$semantic_paths" | sort -u)
            echo "Missing fields:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi

          echo "Project corpus impact metadata is present."

  lint:
    name: lint
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    env:
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run lint suite
        run: scripts/ci/github-suite.sh lint

  cargo-shear:
    name: cargo-shear
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 10
    env:
      CARGO_SHEAR_VERSION: "1.12.0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install cargo-shear
        shell: bash
        run: |
          set -euo pipefail
          if command -v cargo-shear >/dev/null 2>&1 \
             && cargo install --list | grep -q "^cargo-shear v${CARGO_SHEAR_VERSION}:"; then
            echo "cargo-shear ${CARGO_SHEAR_VERSION} already installed"
            exit 0
          fi
          cargo install cargo-shear --version "${CARGO_SHEAR_VERSION}" --locked
      - name: Run cargo shear
        run: cargo shear

  cargo-deny:
    name: cargo-deny
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 10
    env:
      CARGO_DENY_VERSION: "0.19.6"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Install cargo-deny
        shell: bash
        run: |
          set -euo pipefail
          if command -v cargo-deny >/dev/null 2>&1 \
             && cargo install --list | grep -q "^cargo-deny v${CARGO_DENY_VERSION}:"; then
            echo "cargo-deny ${CARGO_DENY_VERSION} already installed"
            exit 0
          fi
          cargo install cargo-deny --version "${CARGO_DENY_VERSION}" --locked
      - name: Run cargo deny
        run: cargo deny check

  dist-binaries:
    name: dist-binaries
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 30
    env:
      GITHUB_SHA: ${{ github.sha }}
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
      # The dist artifact unblocks conformance/emit/fourslash, so PRs avoid
      # target-dir uploads. Trusted main runs publish cargo-target-deps only
      # when Cargo.lock/profile inputs changed and the gate intentionally ran
      # main CI to refresh the exact shared cache key.
      TSZ_CI_CACHE_SAVE_CARGO_TARGETS: ${{ needs.gate.outputs.rust_cache_refresh == 'true' && '1' || '0' }}
      # Keep artifact production independent from sccache service hangs. The
      # dist-fast build is short enough without sccache, and all harness suites
      # are blocked until this artifact uploads.
      TSZ_CI_DISABLE_SCCACHE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build dist-fast binaries
        run: scripts/ci/github-suite.sh dist-binaries
      - name: Pack dist-fast binaries
        run: tar -C .target/dist-fast -cf dist-fast-binaries.tar tsz tsz-server tsz-conformance generate-tsc-cache
      - name: Upload dist-fast binaries
        uses: actions/upload-artifact@v4
        with:
          name: dist-fast-binaries
          path: dist-fast-binaries.tar
          retention-days: 1
          if-no-files-found: error
          compression-level: 1

  project-compile-guard:
    name: project-compile-guard
    needs: [gate, dist-binaries]
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    env:
      npm_config_cache: ${{ github.workspace }}/.ci-cache/npm-project-compile
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Run project compile guard
        run: scripts/ci/project-compile-guard.sh

  project-compile-canary:
    name: project-compile-canary
    needs: [gate, dist-binaries]
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    continue-on-error: true
    env:
      npm_config_cache: ${{ github.workspace }}/.ci-cache/npm-project-compile-canary
      TSZ_CI_CACHE_SAVE: "0"
      TSZ_PROJECT_COMPILE_SET: canary
      TSZ_PROJECT_COMPILE_ALLOW_FAILURES: "1"
      TSZ_PROJECT_COMPILE_INCLUDE_GENERATED_APPS: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Run compile canaries
        run: scripts/ci/project-compile-guard.sh
      - name: Upload compile canary logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-compile-canary-logs
          path: .target/project-compile-guard/*.log
          retention-days: 7
          if-no-files-found: warn
          compression-level: 1

  wasm:
    name: wasm
    needs: gate
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    env:
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
      # Keep sccache writes, but do not tar the wasm target dir on the job's
      # critical path. The wasm target save was ~33s on run 25057027232.
      TSZ_CI_CACHE_SAVE_CARGO_TARGETS: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run wasm suite (nodejs + web targets)
        run: scripts/ci/github-suite.sh wasm-all
      - name: Upload web WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-web
          path: pkg/web/
          retention-days: 30

  wasm-web:
    name: wasm-web
    needs: [gate, wasm]
    if: needs.gate.outputs.full_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download web WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-web
          path: pkg/web/
      - name: Verify web WASM artifact
        run: test -s pkg/web/tsz_wasm_bg.wasm

  node-harness-prep:
    name: node-harness-prep
    needs: gate
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 20
    env:
      GITHUB_SHA: ${{ github.sha }}
      TSZ_CI_SKIP_DIST_RESTORE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Prep node harnesses
        run: scripts/ci/github-suite.sh node-harness-prep
      - name: Pack node harness
        run: |
          tar --create --file node-harness.tar \
            scripts/node_modules/ \
            scripts/emit/dist/ \
            TypeScript/Herebyfile.mjs \
            TypeScript/built/local \
            TypeScript/node_modules \
            TypeScript/tests/cases/fourslash
      - name: Upload node harness artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-harness
          path: node-harness.tar
          retention-days: 1
          if-no-files-found: warn
          compression-level: 1

  unit:
    # Single nextest job (no sharding). The nextest-archive shard architecture
    # was tried in #1657 and reverted in 7984876d7b for two reasons:
    #   1. Many fixture-loading tests use `if !path.exists() { return }` and
    #      silently pass when workspace source isn't on the shard runner.
    #   2. The archive upload/download overhead (~3+ min) dominated the
    #      modest test-execution savings.
    # Today the bottleneck is compile (~14 min) not test execution (~3 min),
    # so sharding test execution is not the lever. Re-evaluate sharding once
    # the sccache silent-exit issue is fixed (then compile drops to seconds
    # on cache hit and sharding becomes worth the overhead).
    #
    # Keep sccache disabled here because the tsz-checker lib-test target can
    # exit silently when built through sccache from a restored warm target
    # cache. Still restore the GCS cargo-home and ci-unit target cache so PRs
    # do not rebuild third-party dependencies from scratch on every run;
    # gcp-cache refreshes source mtimes after restore so workspace test
    # binaries are revalidated.
    #
    # `_TSZ_CI_UNIT_PACKAGES_OVERRIDE` (set by the gate as `unit_packages`) is
    # a space-separated list of crate names. When non-empty, the unit script
    # runs `cargo nextest run -p <crate>` for just those crates instead of the
    # full workspace — used as the P4 draft-phase fast-fail (gate only sets
    # this for draft PRs whose changes are localized to known unit-tested
    # crate source).
    name: unit
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    env:
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
      CARGO_INCREMENTAL: "0"
      TSZ_CI_DISABLE_SCCACHE: "1"
      # Temporary safety cap while conformance aggregate is being unblocked:
      # run 25961843637 still SIGKILLed tsz-checker lib-test compilation at
      # one cargo build job before ci-unit codegen was serialized.
      TSZ_CI_UNIT_CARGO_MB_PER_JOB: "16384"
      TSZ_CI_CACHE_SAVE_CARGO_TARGETS: "1"
      _TSZ_CI_UNIT_PACKAGES_OVERRIDE: ${{ needs.gate.outputs.unit_packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run unit suite
        run: scripts/ci/github-suite.sh unit

  unit-cloudbuild:
    # EXPERIMENT: run the unit suite on Cloud Build private pool
    # `tsz-ci-build-pool` (e2-highcpu-32, 32 vCPU × 32 GiB) and compare wall
    # clock against the Cloud Run `unit` job above. The compile is the
    # bottleneck (~12 min on 8 vCPU); 4× the cores should drop it to ~4 min.
    #
    # Submitted as a parallel job — the existing `unit` is still required for
    # green CI. Promote unit-cloudbuild and demote `unit` after a week of
    # apples-to-apples timing data.
    #
    # Budget: ~$0.024/min × ~5 min × 200 runs/day ≈ $720/month at full PR
    # cadence. Under the $1k approved cap.
    #
    # continue-on-error keeps a Cloud Build flake from blocking the workflow.
    # Not in the required-status set, so failure here is informational only.
    name: unit-cloudbuild
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Submit unit build to Cloud Build pool
        # `gcloud builds submit` tars the working directory, uploads it to the
        # default tsz-ci_cloudbuild GCS staging bucket, then triggers the
        # private-pool build. The previous attempt pointed at the
        # thirdface-ai-oauth_cloudbuild bucket — the tsz-gh-runners SA cannot
        # write there.
        run: |
          set -euo pipefail
          gcloud builds submit \
            --project=tsz-ci \
            --region=us-central1 \
            --config=cloudbuild-unit.yaml \
            --gcs-source-staging-dir=gs://tsz-ci_cloudbuild/cb-source-staging \
            .

  conformance:
    # Conformance shards consume the dist-fast binaries artifact and run the
    # tsz-conformance harness; they do not need unit's test outputs. Each
    # shard runs on its own self-hosted 8-vCPU runner, so concurrent fanout
    # does not compete with the unit-archive compile for rustc capacity.
    name: conformance-${{ matrix.shard }}
    needs: [gate, dist-binaries]
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      _TSZ_CI_CONFORMANCE_SHARD_INDEX: ${{ matrix.shard }}
      _TSZ_CI_CONFORMANCE_SHARD_COUNT: 6
      TSZ_CI_CONFORMANCE_SHARDS: 6
      TSZ_CI_CONFORMANCE_SHARD_STRATEGY: weighted
      TSZ_CI_SKIP_DIST_RESTORE: "1"
      TSZ_CI_SKIP_TS_HARNESS_RESTORE: "1"
      TSZ_CI_TRUST_DIST_FAST_CACHE: "1"
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Run conformance shard
        run: scripts/ci/github-suite.sh conformance

  conformance-aggregate:
    name: conformance-aggregate
    needs: [gate, conformance]
    if: needs.gate.outputs.full_run == 'true' && !cancelled()
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 15
    env:
      GITHUB_SHA: ${{ github.sha }}
      _TSZ_CI_CONFORMANCE_SHARD_COUNT: 6
      TSZ_CI_CONFORMANCE_SHARDS: 6
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Aggregate conformance results
        run: scripts/ci/github-suite.sh conformance-aggregate

  conformance-snapshot-gate:
    name: conformance-snapshot-gate
    needs: gate
    if: needs.gate.outputs.full_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Compare conformance snapshots with PR base
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          python3 scripts/conformance/check-snapshot-regression.py \
            --base-ref FETCH_HEAD \
            --head-ref HEAD
      - name: Skip snapshot comparison
        if: github.event_name != 'pull_request'
        run: echo "Conformance snapshot gate is enforced for pull_request events."

  emit:
    name: emit
    needs: [gate, dist-binaries, node-harness-prep]
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 30
    env:
      _TSZ_CI_EMIT_SHARD_INDEX: 0
      _TSZ_CI_EMIT_SHARD_COUNT: 1
      TSZ_CI_SKIP_DIST_RESTORE: "1"
      TSZ_CI_TRUST_DIST_FAST_CACHE: "1"
      TSZ_CI_SKIP_TS_HARNESS_RESTORE: "1"
      TSZ_CI_NODE_HARNESS_PREPPED: "1"
      TSZ_CI_CACHE_SAVE: "0"
      TSZ_CI_CACHE_RESTORE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Restore GCS caches
        env:
          _TSZ_CI_SUITE: emit-shard
        run: scripts/ci/gcp-cache.sh restore
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Download node harness
        uses: actions/download-artifact@v4
        with:
          name: node-harness
          path: .
      - name: Unpack node harness
        run: tar -xf node-harness.tar
      - name: Run emit suite
        run: scripts/ci/github-suite.sh emit-shard

  fourslash:
    # Each matrix shard runs on its own 8-vCPU cloud runner. Run 25058599510
    # still tailed in fourslash-2 at 6m23, while conformance had spare
    # capacity. Shift those two runners here; weighted snapshot timings reduce
    # the expected max shard work from ~328s at 4 shards to ~219s at 6 shards.
    name: fourslash-${{ matrix.shard }}
    needs: [gate, dist-binaries, node-harness-prep]
    if: needs.gate.outputs.full_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      _TSZ_CI_FOURSLASH_SHARD_INDEX: ${{ matrix.shard }}
      _TSZ_CI_FOURSLASH_SHARD_COUNT: 6
      TSZ_CI_FOURSLASH_SHARD_STRATEGY: weighted
      TSZ_CI_FOURSLASH_WORKERS: 8
      TSZ_CI_FOURSLASH_TIMEOUT_MS: 60000
      TSZ_CI_SKIP_DIST_RESTORE: "1"
      TSZ_CI_TRUST_DIST_FAST_CACHE: "1"
      TSZ_CI_SKIP_TS_HARNESS_RESTORE: "1"
      TSZ_CI_NODE_HARNESS_PREPPED: "1"
      TSZ_CI_CACHE_SAVE: "0"
      TSZ_CI_CACHE_RESTORE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Restore GCS caches
        env:
          _TSZ_CI_SUITE: fourslash-shard
        run: scripts/ci/gcp-cache.sh restore
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Download node harness
        uses: actions/download-artifact@v4
        with:
          name: node-harness
          path: .
      - name: Unpack node harness
        run: tar -xf node-harness.tar
      - name: Run fourslash shard
        run: scripts/ci/github-suite.sh fourslash-shard

  fourslash-aggregate:
    name: fourslash-aggregate
    needs: [gate, fourslash]
    if: needs.gate.outputs.full_run == 'true' && !cancelled()
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 15
    env:
      GITHUB_SHA: ${{ github.sha }}
      _TSZ_CI_FOURSLASH_SHARD_COUNT: 6
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Aggregate fourslash results
        run: scripts/ci/github-suite.sh fourslash-aggregate

  ci-summary:
    name: ${{ needs.gate.outputs.required_summary == 'true' && 'CI Summary' || 'CI Light Summary' }}
    needs:
      - gate
      - lint
      - cargo-shear
      - cargo-deny
      - project-corpus-pr-body
      - dist-binaries
      - project-compile-guard
      - wasm
      - wasm-web
      - node-harness-prep
      - unit
      - conformance-aggregate
      - conformance-snapshot-gate
      - emit
      - fourslash-aggregate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required CI jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          gate = needs["gate"]
          should_run = gate.get("outputs", {}).get("should_run") == "true"
          full_run = gate.get("outputs", {}).get("full_run") == "true"

          if gate.get("result") != "success":
              print(f"gate did not pass: {gate.get('result')}")
              sys.exit(1)

          if not should_run:
              print("CI gated off; summary passes because jobs were intentionally skipped.")
              sys.exit(0)

          required = {"lint", "cargo-shear", "cargo-deny", "dist-binaries", "unit"}
          pr_body = needs.get("project-corpus-pr-body")
          if pr_body and pr_body.get("result") not in ("success", "skipped"):
              print(f"project-corpus-pr-body did not pass: {pr_body.get('result')}")
              sys.exit(1)

          if full_run:
              required.update({
                  "wasm",
                  "wasm-web",
                  "project-compile-guard",
                  "node-harness-prep",
                  "conformance-aggregate",
                  "conformance-snapshot-gate",
                  "emit",
                  "fourslash-aggregate",
              })

          failures = []
          for name, data in needs.items():
              if name == "gate" or name not in required:
                  continue
              if data.get("result") != "success":
                  failures.append(f"{name}: {data.get('result')}")

          if failures:
              print("Required CI jobs did not pass:")
              for failure in failures:
                  print(f"  - {failure}")
              sys.exit(1)

          if full_run:
              print("All required CI jobs passed.")
          else:
              print("Draft/light CI passed: lint, cargo-shear, cargo-deny, dist-binaries, and unit.")
          PY
