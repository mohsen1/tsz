name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache
  _TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache
  TSZ_CI_RUNNER_LABEL: tsz-cloud-run

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          should_run=true
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # The `labeled` event triggers on every label add. We only care
            # about the `ci-approved` label (used to opt fork PRs into CI).
            # For any other label, this would just duplicate the existing
            # CI run from the same SHA's open/sync events, so skip.
            if [[ "${{ github.event.action }}" == "labeled" \
                  && "${{ github.event.label.name }}" != "ci-approved" ]]; then
              echo "Label '${{ github.event.label.name }}' is not 'ci-approved' — skipping redundant run."
              should_run=false
            fi
            if [[ "${{ github.event.pull_request.draft }}" == "true" ]]; then
              should_run=false
            fi
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              # Fork PRs cannot use self-hosted runners by default (untrusted
              # code on shared infra). A maintainer must add the
              # `ci-approved` label after reviewing the diff to opt the PR
              # into full CI. Without that label, only the lightweight
              # ubuntu-latest checks run, which means heavy regressions
              # (e.g. conformance) cannot be caught — which is exactly how
              # PR #1608 slipped 72 conformance regressions into main.
              has_label=$(gh api \
                "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
                --jq '.labels // [] | map(.name) | index("ci-approved") // empty' \
                2>/dev/null || true)
              if [[ -n "$has_label" ]]; then
                echo "Fork PR has ci-approved label — running full CI on self-hosted runners."
              else
                echo "Skipping self-hosted CI for fork PRs (add 'ci-approved' label to enable)."
                should_run=false
              fi
            fi
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Skip redundant main CI when the push is a PR merge already validated by PR CI.
            # Saves ~40+ runner-minutes per merge (32 conformance + lint + unit + wasm + emit shards).
            pr_number=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0].number // empty' 2>/dev/null || true)
            if [[ -z "$pr_number" ]]; then
              commit_subject=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
                --jq '.commit.message | split("\n")[0]' 2>/dev/null || true)
              if [[ "$commit_subject" =~ \(\#([0-9]+)\) ]]; then
                pr_number="${BASH_REMATCH[1]}"
                echo "Commit subject references PR #${pr_number} — using it for main CI skip check"
              fi
            fi
            if [[ -n "$pr_number" ]]; then
              pr_head_sha=$(gh api "repos/${{ github.repository }}/pulls/${pr_number}" \
                --jq '.head.sha' 2>/dev/null || true)
              if [[ -n "$pr_head_sha" ]]; then
                ci_passed=$(gh api \
                  "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${pr_head_sha}&status=success&per_page=1" \
                  --jq '.total_count' 2>/dev/null || echo "0")
                if [[ "${ci_passed}" -gt 0 ]]; then
                  echo "PR #${pr_number} head ${pr_head_sha} already validated — skipping redundant main CI"
                  should_run=false
                else
                  echo "No passing CI run for PR #${pr_number} head ${pr_head_sha} — running main CI"
                fi
              fi
            fi
          fi
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

  lint:
    name: lint
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    env:
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run lint suite
        run: scripts/ci/github-suite.sh lint

  dist-binaries:
    name: dist-binaries
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 30
    env:
      GITHUB_SHA: ${{ github.sha }}
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
      # The dist artifact unblocks conformance/emit/fourslash. On main run
      # 25057027232, saving cargo-target-deps took ~100s after a 75s build,
      # while sccache already had 100% Rust hits.
      TSZ_CI_CACHE_SAVE_CARGO_TARGETS: "0"
      # Keep artifact production independent from sccache service hangs. The
      # dist-fast build is short enough without sccache, and all harness suites
      # are blocked until this artifact uploads.
      TSZ_CI_DISABLE_SCCACHE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Build dist-fast binaries
        run: scripts/ci/github-suite.sh dist-binaries
      - name: Pack dist-fast binaries
        run: tar -C .target/dist-fast -cf dist-fast-binaries.tar tsz tsz-server tsz-conformance generate-tsc-cache
      - name: Upload dist-fast binaries
        uses: actions/upload-artifact@v4
        with:
          name: dist-fast-binaries
          path: dist-fast-binaries.tar
          retention-days: 1
          if-no-files-found: error
          compression-level: 1

  wasm:
    name: wasm
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 45
    env:
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
      # Keep sccache writes, but do not tar the wasm target dir on the job's
      # critical path. The wasm target save was ~33s on run 25057027232.
      TSZ_CI_CACHE_SAVE_CARGO_TARGETS: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run wasm suite (nodejs + web targets)
        run: scripts/ci/github-suite.sh wasm-all
      - name: Upload web WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-web
          path: pkg/web/
          retention-days: 30

  wasm-web:
    name: wasm-web
    needs: [gate, wasm]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download web WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-web
          path: pkg/web/
      - name: Verify web WASM artifact
        run: test -s pkg/web/tsz_wasm_bg.wasm

  node-harness-prep:
    name: node-harness-prep
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 20
    env:
      GITHUB_SHA: ${{ github.sha }}
      TSZ_CI_SKIP_DIST_RESTORE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Prep node harnesses
        run: scripts/ci/github-suite.sh node-harness-prep
      - name: Pack node harness
        run: |
          tar --create --file node-harness.tar \
            scripts/node_modules/ \
            scripts/emit/dist/ \
            TypeScript/built/local \
            TypeScript/node_modules
      - name: Upload node harness artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-harness
          path: node-harness.tar
          retention-days: 1
          if-no-files-found: warn
          compression-level: 1

  unit:
    # One nextest job avoids the 3m+ archive/upload critical path. Nextest
    # already parallelizes heavily inside the runner, and the latest green
    # #1657 sample showed the actual shard execution was much cheaper than
    # preparing and shipping the archive.
    name: unit
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 20
    env:
      SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
      # Nextest completed in ~2m on run 25057027232, then the job spent
      # 383s packing cargo-target-unit. That target-dir tarball dominates
      # main wall clock, while sccache remains active for compile reuse.
      TSZ_CI_CACHE_SAVE_CARGO_TARGETS: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run unit suite
        run: scripts/ci/github-suite.sh unit

  conformance:
    # Conformance remains comfortably below the current wall-clock tail. In
    # run 25058599510, 6 shards finished in <=2m21 while unit/fourslash were
    # still running. Keep enough parallelism to stay off the critical path
    # while returning runner capacity to the slower suites.
    name: conformance-${{ matrix.shard }}
    needs: [gate, dist-binaries]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      _TSZ_CI_CONFORMANCE_SHARD_INDEX: ${{ matrix.shard }}
      _TSZ_CI_CONFORMANCE_SHARD_COUNT: 4
      TSZ_CI_CONFORMANCE_SHARDS: 4
      TSZ_CI_SKIP_DIST_RESTORE: "1"
      TSZ_CI_SKIP_TS_HARNESS_RESTORE: "1"
      TSZ_CI_TRUST_DIST_FAST_CACHE: "1"
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Run conformance shard
        run: scripts/ci/github-suite.sh conformance

  conformance-aggregate:
    name: conformance-aggregate
    needs: [gate, conformance]
    if: needs.gate.outputs.should_run == 'true' && !cancelled()
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 15
    env:
      GITHUB_SHA: ${{ github.sha }}
      _TSZ_CI_CONFORMANCE_SHARD_COUNT: 4
      TSZ_CI_CONFORMANCE_SHARDS: 4
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Aggregate conformance results
        run: scripts/ci/github-suite.sh conformance-aggregate

  emit:
    name: emit
    needs: [gate, dist-binaries, node-harness-prep]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 30
    env:
      _TSZ_CI_EMIT_SHARD_INDEX: 0
      _TSZ_CI_EMIT_SHARD_COUNT: 1
      TSZ_CI_SKIP_DIST_RESTORE: "1"
      TSZ_CI_TRUST_DIST_FAST_CACHE: "1"
      TSZ_CI_SKIP_TS_HARNESS_RESTORE: "1"
      TSZ_CI_NODE_HARNESS_PREPPED: "1"
      TSZ_CI_CACHE_SAVE: "0"
      TSZ_CI_CACHE_RESTORE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Restore GCS caches
        env:
          _TSZ_CI_SUITE: emit-shard
        run: scripts/ci/gcp-cache.sh restore
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Download node harness
        uses: actions/download-artifact@v4
        with:
          name: node-harness
          path: .
      - name: Unpack node harness
        run: tar -xf node-harness.tar
      - name: Run emit suite
        run: scripts/ci/github-suite.sh emit-shard

  fourslash:
    # Each matrix shard runs on its own 8-vCPU cloud runner. Run 25058599510
    # still tailed in fourslash-2 at 6m23, while conformance had spare
    # capacity. Shift those two runners here; weighted snapshot timings reduce
    # the expected max shard work from ~328s at 4 shards to ~219s at 6 shards.
    name: fourslash-${{ matrix.shard }}
    needs: [gate, dist-binaries, node-harness-prep]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    env:
      _TSZ_CI_FOURSLASH_SHARD_INDEX: ${{ matrix.shard }}
      _TSZ_CI_FOURSLASH_SHARD_COUNT: 6
      TSZ_CI_FOURSLASH_SHARD_STRATEGY: weighted
      TSZ_CI_FOURSLASH_WORKERS: 8
      TSZ_CI_FOURSLASH_TIMEOUT_MS: 60000
      TSZ_CI_SKIP_DIST_RESTORE: "1"
      TSZ_CI_TRUST_DIST_FAST_CACHE: "1"
      TSZ_CI_SKIP_TS_HARNESS_RESTORE: "1"
      TSZ_CI_NODE_HARNESS_PREPPED: "1"
      TSZ_CI_CACHE_SAVE: "0"
      TSZ_CI_CACHE_RESTORE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Restore GCS caches
        env:
          _TSZ_CI_SUITE: fourslash-shard
        run: scripts/ci/gcp-cache.sh restore
      - name: Download dist-fast binaries
        uses: actions/download-artifact@v4
        with:
          name: dist-fast-binaries
          path: .
      - name: Unpack dist-fast binaries
        run: mkdir -p .target/dist-fast && tar -C .target/dist-fast -xf dist-fast-binaries.tar
      - name: Download node harness
        uses: actions/download-artifact@v4
        with:
          name: node-harness
          path: .
      - name: Unpack node harness
        run: tar -xf node-harness.tar
      - name: Run fourslash shard
        run: scripts/ci/github-suite.sh fourslash-shard

  fourslash-aggregate:
    name: fourslash-aggregate
    needs: [gate, fourslash]
    if: needs.gate.outputs.should_run == 'true' && !cancelled()
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 15
    env:
      GITHUB_SHA: ${{ github.sha }}
      _TSZ_CI_FOURSLASH_SHARD_COUNT: 6
      TSZ_CI_CACHE_SAVE: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Aggregate fourslash results
        run: scripts/ci/github-suite.sh fourslash-aggregate

  ci-summary:
    name: CI Summary
    needs:
      - gate
      - lint
      - dist-binaries
      - wasm
      - wasm-web
      - node-harness-prep
      - unit
      - conformance-aggregate
      - emit
      - fourslash-aggregate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required CI jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          gate = needs["gate"]
          should_run = gate.get("outputs", {}).get("should_run") == "true"

          if gate.get("result") != "success":
              print(f"gate did not pass: {gate.get('result')}")
              sys.exit(1)

          if not should_run:
              print("CI gated off; summary passes because heavy jobs were intentionally skipped.")
              sys.exit(0)

          failures = []
          for name, data in needs.items():
              if name == "gate":
                  continue
              if data.get("result") != "success":
                  failures.append(f"{name}: {data.get('result')}")

          if failures:
              print("Required CI jobs did not pass:")
              for failure in failures:
                  print(f"  - {failure}")
              sys.exit(1)

          print("All required CI jobs passed.")
          PY
