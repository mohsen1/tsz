name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'   # only run when root workspace Cargo.toml changes
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump (none = detect from Cargo.toml diff)'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      force_publish:
        description: 'Publish even if version has not changed (re-publish missing crates)'
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # (Optional) Bump the version, commit, and push — skipped when bump=none.
  # Uses [skip ci] on the commit so the push does NOT retrigger this workflow.
  # ──────────────────────────────────────────────────────────────────────────
  bump-version:
    name: Bump version (${{ inputs.bump || 'none' }})
    runs-on: ubuntu-latest
    if: inputs.bump != 'none' && inputs.bump != ''
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Bump ${{ inputs.bump }} version in Cargo.toml
        id: bump
        run: |
          CURR=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURR"
          case "${{ inputs.bump }}" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Bumping $CURR → $NEW"
          sed -i "s/version = \"$CURR\"/version = \"$NEW\"/g" Cargo.toml
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Update Cargo.lock to reflect version changes
          cargo check --workspace 2>/dev/null || true
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

  # ──────────────────────────────────────────────────────────────────────────
  # Detect version change (or accept it from the bump job).
  # Creates a git tag; downstream publish jobs depend on this.
  # ──────────────────────────────────────────────────────────────────────────
  check-version:
    name: Detect version bump
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: ${{ !failure() }}
    permissions:
      contents: write
    outputs:
      version_changed: ${{ steps.detect.outputs.version_changed }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: main   # ensure we have the bump commit when bump-version ran

      - name: Detect version change
        id: detect
        run: |
          # If bump-version ran and succeeded, we already know the version changed.
          BUMPED_VERSION="${{ needs.bump-version.outputs.new_version }}"
          if [ -n "$BUMPED_VERSION" ]; then
            echo "Version bumped to $BUMPED_VERSION by bump-version job"
            echo "version_changed=true"       >> "$GITHUB_OUTPUT"
            echo "version=$BUMPED_VERSION"    >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.force_publish }}" = "true" ]; then
            CURR=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            echo "force_publish=true — treating version $CURR as changed"
            echo "version_changed=true"  >> "$GITHUB_OUTPUT"
            echo "version=$CURR"         >> "$GITHUB_OUTPUT"
          else
            PREV=$(git show HEAD^:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
            CURR=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            echo "Previous version: $PREV"
            echo "Current version:  $CURR"
            if [ "$CURR" != "$PREV" ] && [ -n "$CURR" ]; then
              echo "version_changed=true"  >> "$GITHUB_OUTPUT"
              echo "version=$CURR"         >> "$GITHUB_OUTPUT"
            else
              echo "version_changed=false" >> "$GITHUB_OUTPUT"
              echo "version=$CURR"         >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create git tag
        if: steps.detect.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.detect.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip if tag already exists (e.g. force_publish re-run)
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

  # ──────────────────────────────────────────────────────────────────────────
  # Publish all Rust crates to crates.io
  # ──────────────────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish crates to crates.io
    needs: check-version
    if: >
      !failure() &&
      needs.check-version.result == 'success' &&
      needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          ref: main   # ensure we have the bump commit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-crates.sh

  # ──────────────────────────────────────────────────────────────────────────
  # Build native binaries for each platform
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    name: Build native (${{ matrix.pkg }})
    needs: check-version
    if: >
      !failure() &&
      needs.check-version.result == 'success' &&
      needs.check-version.outputs.version_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,    os: macos-14,       pkg: darwin-arm64 }
          - { target: x86_64-apple-darwin,     os: macos-13,       pkg: darwin-x64 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest, pkg: linux-x64 }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, pkg: linux-arm64,  cross: true }
          - { target: x86_64-pc-windows-msvc,  os: windows-latest, pkg: win32-x64 }
          - { target: aarch64-pc-windows-msvc, os: windows-latest, pkg: win32-arm64,  cross: true }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-native-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-native-

      - name: Build native binaries
        run: cargo build --profile dist-fast -p tsz-cli --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts/bin
          if [[ "${{ matrix.pkg }}" == win32-* ]]; then
            cp target/${{ matrix.target }}/dist-fast/tsz.exe artifacts/bin/
            cp target/${{ matrix.target }}/dist-fast/tsz-server.exe artifacts/bin/
          else
            cp target/${{ matrix.target }}/dist-fast/tsz artifacts/bin/
            cp target/${{ matrix.target }}/dist-fast/tsz-server artifacts/bin/
            chmod +x artifacts/bin/*
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.pkg }}
          path: artifacts/bin/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Build WASM package
  # ──────────────────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    needs: check-version
    if: >
      !failure() &&
      needs.check-version.result == 'success' &&
      needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          ref: main

      - name: Install Rust toolchain (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (via binaryen)
        run: sudo apt-get install -y binaryen

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM
        run: bash scripts/build-npm-packages.sh --wasm-only

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: |
            npm/tsz/wasm/node/
            npm/tsz/wasm/bundler/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Assemble and publish all npm packages
  # ──────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish npm packages
    needs: [check-version, build-native, build-wasm]
    if: >
      !failure() &&
      needs.check-version.result == 'success' &&
      needs.check-version.outputs.version_changed == 'true' &&
      needs.build-native.result == 'success' &&
      needs.build-wasm.result == 'success'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Download all native binary artifacts into their platform package dirs
      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-arm64
          path: npm/@mohsen-azimi/tsz-darwin-arm64/bin/

      - name: Download darwin-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-x64
          path: npm/@mohsen-azimi/tsz-darwin-x64/bin/

      - name: Download linux-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: npm/@mohsen-azimi/tsz-linux-x64/bin/

      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-linux-arm64
          path: npm/@mohsen-azimi/tsz-linux-arm64/bin/

      - name: Download win32-x64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-win32-x64
          path: npm/@mohsen-azimi/tsz-win32-x64/bin/

      - name: Download win32-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: native-win32-arm64
          path: npm/@mohsen-azimi/tsz-win32-arm64/bin/

      # Download WASM build artifacts
      - name: Download WASM build
        uses: actions/download-artifact@v4
        with:
          name: wasm-build
          path: npm/tsz/wasm/

      # Assemble packages (skip build, just update versions + copy assets)
      - name: Assemble npm packages
        run: bash scripts/build-npm-packages.sh --skip-build

      # Make binaries executable (artifact upload may lose permissions)
      - name: Fix binary permissions
        run: |
          for dir in npm/@mohsen-azimi/tsz-*/bin; do
            chmod +x "$dir"/* 2>/dev/null || true
          done

      # Publish platform packages first (main package depends on them)
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PLATFORMS=(darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64 win32-arm64)
          for platform in "${PLATFORMS[@]}"; do
            PKG_DIR="npm/@mohsen-azimi/tsz-$platform"
            echo "Publishing @mohsen-azimi/tsz-$platform..."
            cd "$PKG_DIR"
            if npm publish --access public 2>&1; then
              echo "  Published successfully!"
            else
              VERSION=$(node -p "require('./package.json').version")
              if npm view "@mohsen-azimi/tsz-$platform" version 2>/dev/null | grep -q "$VERSION"; then
                echo "  Version $VERSION already published — skipping (OK)"
              else
                echo "  npm publish failed for @mohsen-azimi/tsz-$platform"
                exit 1
              fi
            fi
            cd "$GITHUB_WORKSPACE"
          done

      # Publish main package
      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/tsz
          echo "Publishing @mohsen-azimi/tsz..."
          if npm publish --access public 2>&1; then
            echo "Published successfully!"
          else
            VERSION=$(node -p "require('./package.json').version")
            if npm view "@mohsen-azimi/tsz" version 2>/dev/null | grep -q "$VERSION"; then
              echo "Version $VERSION already published — skipping (OK)"
            else
              echo "npm publish failed for @mohsen-azimi/tsz"
              exit 1
            fi
          fi
