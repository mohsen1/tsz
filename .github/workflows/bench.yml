name: Bench

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/bench/**'
      - '.github/workflows/bench.yml'
  schedule:
    - cron: '0 3 * * *'  # Daily at 3am UTC — always runs full cold PGO benchmark
  workflow_dispatch:
    inputs:
      full:
        description: 'Run full cold PGO benchmark (otherwise runs quick smoke test)'
        type: boolean
        default: false

# Push runs (quick smoke tests) can be cancelled by newer pushes.
# Full benchmark runs (manual/nightly) are not in-progress cancelled.
concurrency:
  group: bench
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  _TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache

jobs:
  bench:
    name: bench
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 120
    env:
      # Full mode: nightly schedule + manual dispatch with full=true.
      # Push runs use quick smoke mode (no PGO, fewer iterations, subset of repos).
      BENCH_FULL: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full)) && '1' || '0' }}
      BENCH_COLD: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full)) && '1' || '0' }}
      BENCH_PGO: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.full)) && '1' || '0' }}
      TSC_NPM_SPEC: "6.0.2"
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restore caches
        run: scripts/ci/gcp-cache.sh restore

      - name: Install pnpm
        run: |
          if ! command -v pnpm &>/dev/null; then
            mkdir -p "$HOME/.npm-global"
            npm config set prefix "$HOME/.npm-global"
            npm install -g pnpm --silent
            echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          fi

      - name: Run benchmarks
        shell: bash
        run: |
          set -euo pipefail

          # Background resource monitor — logs load/memory/disk every 30s to aid
          # post-mortem analysis if the runner is killed by OOM or resource pressure.
          (
            while true; do
              echo "::group::resource snapshot $(date -Is)"
              echo "load:"; uptime || true
              echo "memory:"; free -h || true
              echo "disk:"; df -h || true
              echo "top processes:"; ps -eo pid,ppid,%cpu,%mem,rss,cmd --sort=-rss 2>/dev/null | head -20 || true
              echo "::endgroup::"
              sleep 30
            done
          ) &
          _monitor_pid=$!
          trap 'kill "$_monitor_pid" 2>/dev/null || true' EXIT

          args=(
            --json
            --json-file "$GITHUB_WORKSPACE/bench-results.json"
          )
          if [[ "${BENCH_FULL:-0}" != "1" ]]; then
            args+=(--quick --filter 'utility-types|ts-toolbelt|ts-essentials')
          fi
          ./scripts/bench/bench-vs-tsgo.sh "${args[@]}" \
            2>&1 | tee "$GITHUB_WORKSPACE/bench-run.log"

      - name: Publish results
        if: always()
        run: |
          if [[ ! -f "$GITHUB_WORKSPACE/bench-results.json" ]]; then
            echo "No results to publish (benchmark may have failed or timed out)."
            tail -100 "$GITHUB_WORKSPACE/bench-run.log" || true
            exit 1
          fi
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          gsutil -q cp "$GITHUB_WORKSPACE/bench-results.json" \
            "${_TSZ_CI_CACHE_BUCKET}/bench-runs/${TIMESTAMP}.json"
          gsutil -q cp "$GITHUB_WORKSPACE/bench-results.json" \
            "${_TSZ_CI_CACHE_BUCKET}/bench-runs/latest.json"
          echo "Published: ${_TSZ_CI_CACHE_BUCKET}/bench-runs/${TIMESTAMP}.json"
          echo "Published: ${_TSZ_CI_CACHE_BUCKET}/bench-runs/latest.json"

      - name: Trigger website redeploy
        if: env.BENCH_FULL == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run gh-pages.yml --ref main
