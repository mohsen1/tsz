name: Bench

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Full benchmark runs are intentionally serialized across CI completions,
# schedules, and manual dispatches. A newer commit must not cancel the running
# benchmark, and a second workflow run must not compete for the same benchmark
# runners.
concurrency:
  group: bench
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

env:
  _TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache
  BENCH_FULL: "1"
  BENCH_COLD: "1"
  BENCH_PGO: "1"
  TSC_NPM_SPEC: "6.0.2"
  GITHUB_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  BENCH_TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  CARGO_HOME: ${{ github.workspace }}/.ci-cache/cargo-home
  npm_config_cache: ${{ github.workspace }}/.ci-cache/npm
  PNPM_STORE_DIR: ${{ github.workspace }}/.ci-cache/pnpm-store

jobs:
  bench-prepare:
    name: bench-prepare
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BENCH_TARGET_SHA }}
          fetch-depth: 1

      - name: Restore GCS caches
        env:
          _TSZ_CI_SUITE: bench
        run: scripts/ci/gcp-cache.sh restore

      - name: Restore bench npm/tool cache
        uses: actions/cache@v4
        with:
          path: |
            .target-bench/tools
            .ci-cache/pnpm-store
          key: bench-tools-${{ runner.os }}-${{ hashFiles('scripts/bench/bench-vs-tsgo.sh', 'scripts/package-lock.json', 'scripts/package.json') }}
          restore-keys: |
            bench-tools-${{ runner.os }}-

      - name: Install pnpm
        run: |
          if ! command -v pnpm &>/dev/null; then
            mkdir -p "$HOME/.npm-global"
            npm config set prefix "$HOME/.npm-global"
            npm install -g pnpm --silent
            echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          fi
          pnpm config set store-dir "$PNPM_STORE_DIR"

      - name: Prepare benchmark binary and tools
        run: ./scripts/bench/bench-vs-tsgo.sh --prepare-only

      - name: Save GCS caches
        env:
          _TSZ_CI_SUITE: bench
        run: scripts/ci/gcp-cache.sh save

      - name: Pack benchmark prep artifact
        run: tar -cf bench-prep.tar .target-bench/tools .target-bench/dist

      - name: Upload benchmark prep artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-prep
          path: bench-prep.tar
          retention-days: 1
          if-no-files-found: error
          compression-level: 1

  bench:
    name: bench-${{ matrix.label }}
    needs: bench-prepare
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: core
            timeout: 120
            filter: 'conditionalTypeDiscriminatingLargeUnionRegularTypeFetchingSpeedReasonable\.ts|manyConstExports\.ts|binderBinaryExpressionStress\.ts|binderBinaryExpressionStressJs\.ts|enumLiteralsSubtypeReduction\.ts|binaryArithmeticControlFlowGraphNotTooLarge\.ts|privacyFunctionParameterDeclFile\.ts|privacyGloFunc\.ts|privacyTypeParameterOfFunctionDeclFile\.ts|typedArrays\.ts|controlFlowArrays\.ts|[0-9]+ classes|[0-9]+ generic functions|DeepPartial optional-chain|Shallow optional-chain|[0-9]+ union members|Recursive generic depth|Conditional dist N|Mapped type keys|Template literal N|Deep subtype depth|Intersection N|Infer stress N|CFA branches|BCT candidates|Constraint conflicts N|Mapped complex template keys'
          - label: projects
            timeout: 120
            filter: 'utility-types|ts-toolbelt|ts-essentials|utility-types-project|ts-toolbelt-project|ts-essentials-project|rxjs-project|type-fest-project|zod-project|kysely-project'
          - label: large-ts-repo
            timeout: 90
            filter: '^large-ts-repo$'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BENCH_TARGET_SHA }}
          fetch-depth: 1

      - name: Restore GCS caches
        env:
          _TSZ_CI_SUITE: bench
        run: scripts/ci/gcp-cache.sh restore

      - name: Restore external fixture cache
        uses: actions/cache@v4
        with:
          path: |
            .target-bench/external
            .ci-cache/pnpm-store
          key: bench-fixtures-${{ matrix.label }}-${{ runner.os }}-${{ hashFiles('scripts/bench/bench-vs-tsgo.sh') }}
          restore-keys: |
            bench-fixtures-${{ matrix.label }}-${{ runner.os }}-
            bench-fixtures-${{ runner.os }}-

      - name: Download benchmark prep artifact
        uses: actions/download-artifact@v4
        with:
          name: bench-prep
          path: .

      - name: Unpack benchmark prep artifact
        run: tar -xf bench-prep.tar

      - name: Install pnpm
        run: |
          if ! command -v pnpm &>/dev/null; then
            mkdir -p "$HOME/.npm-global"
            npm config set prefix "$HOME/.npm-global"
            npm install -g pnpm --silent
            echo "$HOME/.npm-global/bin" >> "$GITHUB_PATH"
          fi
          pnpm config set store-dir "$PNPM_STORE_DIR"

      - name: Run benchmark shard
        shell: bash
        run: |
          set -uo pipefail

          (
            while true; do
              echo "::group::resource snapshot $(date -Is)"
              echo "load:"; uptime || true
              echo "memory:"; free -h || true
              echo "disk:"; df -h || true
              echo "top processes:"; ps -eo pid,ppid,%cpu,%mem,rss,cmd --sort=-rss 2>/dev/null | head -20 || true
              echo "::endgroup::"
              sleep 30
            done
          ) &
          _monitor_pid=$!
          trap 'kill "$_monitor_pid" 2>/dev/null || true' EXIT

          export TSZ="$GITHUB_WORKSPACE/.target-bench/dist/tsz"
          echo "Using prepared benchmark TSZ binary: $TSZ"
          ./scripts/bench/bench-vs-tsgo.sh \
            --filter '${{ matrix.filter }}' \
            --json \
            --json-file "$GITHUB_WORKSPACE/bench-results-${{ matrix.label }}.json" \
            2>&1 | tee "$GITHUB_WORKSPACE/bench-run-${{ matrix.label }}.log"

      - name: Save GCS caches
        if: success()
        env:
          _TSZ_CI_SUITE: bench
        run: scripts/ci/gcp-cache.sh save

      - name: Upload benchmark shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.label }}
          path: |
            bench-results-${{ matrix.label }}.json
            bench-run-${{ matrix.label }}.log
          retention-days: 7
          if-no-files-found: warn
          compression-level: 1

  publish:
    name: bench-publish
    needs: bench
    if: needs.bench.result == 'success'
    runs-on: [self-hosted, tsz-cloud-run]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BENCH_TARGET_SHA }}
          fetch-depth: 1

      - name: Download benchmark shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-results-*
          path: bench-artifacts
          merge-multiple: true

      - name: Merge benchmark results
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t json_files < <(find bench-artifacts -name 'bench-results-*.json' -type f | sort)
          if [[ "${#json_files[@]}" -eq 0 ]]; then
            echo "No benchmark result JSON files found."
            find bench-artifacts -maxdepth 2 -type f -print || true
            exit 1
          fi
          if [[ "${#json_files[@]}" -ne 3 ]]; then
            echo "Expected 3 benchmark shard JSON files, found ${#json_files[@]}."
            printf 'Found JSON files:\n'
            printf '  %s\n' "${json_files[@]}"
            find bench-artifacts -maxdepth 2 -type f -print || true
            exit 1
          fi
          node scripts/bench/merge-results.mjs "$GITHUB_WORKSPACE/bench-results.json" "${json_files[@]}"

      - name: Upload merged benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-merged
          path: bench-results.json
          retention-days: 30
          if-no-files-found: error
          compression-level: 1

      - name: Publish results
        run: |
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          gsutil -q cp "$GITHUB_WORKSPACE/bench-results.json" \
            "${_TSZ_CI_CACHE_BUCKET}/bench-runs/${TIMESTAMP}.json"
          gsutil -q cp "$GITHUB_WORKSPACE/bench-results.json" \
            "${_TSZ_CI_CACHE_BUCKET}/bench-runs/latest.json"
          echo "Published: ${_TSZ_CI_CACHE_BUCKET}/bench-runs/${TIMESTAMP}.json"
          echo "Published: ${_TSZ_CI_CACHE_BUCKET}/bench-runs/latest.json"

      - name: Trigger website redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run gh-pages.yml --ref main
