name: Re-run CI on PR comment

# Lets PR contributors re-run failed CI without write access by commenting
# `/retest` or `/ci` on their PR. The workflow itself runs from `main` (not
# the PR head), reads the PR's most recent CI run, and calls
# `gh run rerun --failed` on it. No contributor code is executed here.
#
# Permission gate: comment author must be the PR author OR a member with at
# least `write` association (OWNER, MEMBER, COLLABORATOR, CONTRIBUTOR with
# explicit write). First-time drive-by commenters cannot trigger CI re-runs.

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  pull-requests: read
  contents: read

jobs:
  rerun:
    name: Re-run CI
    if: |
      github.event.issue.pull_request != null &&
      github.event.issue.state == 'open' &&
      (
        contains(github.event.comment.body, '/retest') ||
        contains(github.event.comment.body, '/ci')
      ) &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.user.login == github.event.issue.user.login
      )
    runs-on: ubuntu-latest
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api -X POST "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content='rocket' || true

      - name: Resolve PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          head_sha=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.sha')
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"

      - name: Find latest CI run for the PR head
        id: run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          # The CI workflow file (must match the workflow we want to re-run).
          # Update this if the main CI workflow filename changes.
          runs_json=$(gh run list \
            --repo "${REPO}" \
            --workflow ci.yml \
            --commit "${HEAD_SHA}" \
            --limit 10 \
            --json databaseId,conclusion,status,url)

          active_run_id=$(printf '%s' "${runs_json}" | jq -r '
            [.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending")]
            | .[0].databaseId // empty
          ')
          active_run_url=$(printf '%s' "${runs_json}" | jq -r '
            [.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "requested" or .status == "pending")]
            | .[0].url // empty
          ')
          if [ -n "${active_run_id}" ]; then
            echo "active_run_id=${active_run_id}" >> "$GITHUB_OUTPUT"
            echo "active_run_url=${active_run_url}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id=$(printf '%s' "${runs_json}" | jq -r '.[0].databaseId // empty')
          run_url=$(printf '%s' "${runs_json}" | jq -r '.[0].url // empty')
          if [ -z "${run_id}" ]; then
            echo "::error::No CI run found for SHA ${HEAD_SHA}; nothing to re-run."
            exit 1
          fi
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "run_url=${run_url}" >> "$GITHUB_OUTPUT"

      - name: Re-run failed jobs
        if: steps.run.outputs.active_run_id == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.run.outputs.run_id }}
        run: |
          gh run rerun --repo "${REPO}" --failed "${RUN_ID}"

      - name: Comment with link to re-run
        if: always() && job.status != 'cancelled'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ steps.run.outputs.run_id }}
          RUN_URL: ${{ steps.run.outputs.run_url }}
          ACTIVE_RUN_URL: ${{ steps.run.outputs.active_run_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ -n "${ACTIVE_RUN_URL}" ]; then
            body="CI is already queued or running for the latest PR head; skipping a duplicate re-run: ${ACTIVE_RUN_URL}"
          elif [ "${JOB_STATUS}" = "success" ]; then
            body="Re-running failed jobs on the latest CI run: ${RUN_URL:-https://github.com/${REPO}/actions/runs/${RUN_ID}}"
          else
            body="Could not re-run CI. See workflow logs."
          fi
          gh pr comment "${PR_NUMBER}" --repo "${REPO}" --body "${body}"
