name: Benchmark

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

permissions:
  contents: read

# Benchmarks run independently from deploys — own concurrency group
concurrency:
  group: benchmark
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          # bench-vs-tsgo.sh uses .target-bench/ for LTO builds — cache it
          workspaces: ". -> .target-bench"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i hyperfine_1.18.0_amd64.deb

      - name: Run benchmarks
        run: ./scripts/bench-vs-tsgo.sh --json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          path: artifacts/bench-vs-tsgo-*.json
          retention-days: 30

      # Persist to cache for the deploy workflow to pick up
      - name: Cache benchmark data
        uses: actions/cache/save@v4
        with:
          path: artifacts/bench-vs-tsgo-*.json
          key: benchmark-data-${{ github.sha }}
