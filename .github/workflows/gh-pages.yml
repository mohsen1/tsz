name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'crates/tsz-website/**'
      - 'crates/**/*.rs'
      - 'crates/**/Cargo.toml'
      - 'docs/**/*.md'
      - 'docs/architecture.html'
      - 'AGENTS.md'
      - 'scripts/conformance/conformance-snapshot.json'
      - 'scripts/emit/emit-snapshot.json'
      - 'scripts/fourslash/fourslash-snapshot.json'
      - '.github/workflows/gh-pages.yml'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_run:
    workflows: ["CI", "Bench"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  # Never cancel an in-flight deploy — the check job skips if one is already
  # running so we don't queue up stale work.
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.diff.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if another deploy is already running
        id: in_flight
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IN_FLIGHT=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/gh-pages.yml/runs?status=in_progress&per_page=20" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})] | length")
          QUEUED=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/gh-pages.yml/runs?status=queued&per_page=20" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }} and .id < ${{ github.run_id }})] | length")
          BUSY=$((IN_FLIGHT + QUEUED))
          echo "Other deploy runs in_progress=${IN_FLIGHT} queued_before_us=${QUEUED}"
          if [ "$BUSY" -gt 0 ]; then
            echo "another deploy is busy — skipping this trigger"
            echo "in_flight=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_flight=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes since last deploy
        id: diff
        env:
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
        run: |
          if [ "${{ steps.in_flight.outputs.in_flight }}" = "true" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "$WORKFLOW_RUN_CONCLUSION" = "success" ] && \
              [ "$WORKFLOW_RUN_HEAD_BRANCH" = "main" ] && \
              { [ "$WORKFLOW_RUN_NAME" = "CI" ] || [ "$WORKFLOW_RUN_NAME" = "Bench" ]; }; then
              echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            else
              echo "workflow_run was not successful main CI/Bench, skipping"
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git log --since="25 hours ago" --oneline | grep -q .; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes since last deploy, skipping"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  wasm:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Try to reuse the web WASM artifact already built by the CI wasm job
      # for the same commit. Falls back to the local cache, then a full build.
      - name: Download web WASM from CI
        id: wasm-ci-download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CI_RUN=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?status=success&branch=main&per_page=5" \
            --jq "[.workflow_runs[] | select(.head_sha == \"${{ github.sha }}\")][0].id" 2>/dev/null || echo "")
          if [[ -n "$CI_RUN" && "$CI_RUN" != "null" ]]; then
            echo "Found CI run $CI_RUN for this SHA, downloading wasm-web artifact..."
            gh run download "$CI_RUN" -n wasm-web -D pkg/web/ 2>/dev/null \
              && echo "downloaded=true" >> "$GITHUB_OUTPUT" \
              || echo "Artifact download failed, will build locally."
          else
            echo "No matching CI run found for ${{ github.sha }}, will build locally."
          fi
        continue-on-error: true

      - name: Cache built WASM output
        id: wasm-cache
        if: steps.wasm-ci-download.outputs.downloaded != 'true'
        uses: actions/cache@v4
        with:
          path: pkg/web/
          key: wasm-web-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'crates/*/src/**', 'crates/*/build.rs') }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.wasm-ci-download.outputs.downloaded != 'true' && steps.wasm-cache.outputs.cache-hit != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.wasm-ci-download.outputs.downloaded != 'true' && steps.wasm-cache.outputs.cache-hit != 'true'
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        if: steps.wasm-ci-download.outputs.downloaded != 'true' && steps.wasm-cache.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (via binaryen)
        if: steps.wasm-ci-download.outputs.downloaded != 'true' && steps.wasm-cache.outputs.cache-hit != 'true'
        run: sudo apt-get install -y binaryen

      - name: Build WASM (web target)
        if: steps.wasm-ci-download.outputs.downloaded != 'true' && steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          cp LICENSE.txt crates/tsz-wasm/LICENSE.txt
          # wasm-opt currently produces a web build that fails during
          # __wbindgen_init_externref_table in the playground runtime.
          wasm-pack build crates/tsz-wasm --target web --out-dir ../../pkg/web --no-opt

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-web
          path: pkg/web/
          retention-days: 7

  build:
    needs: [check, wasm]
    if: ${{ always() && needs.check.outputs.should_deploy == 'true' && !cancelled() && needs.wasm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Benchmarks run in bench.yml and publish a merged GitHub Actions artifact.
      # Pull the latest successful artifact into the Pages build so the public
      # site and local previews can fetch benchmark data without GCS credentials.
      - name: Find latest benchmark artifact run
        id: latest-benchmark
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RUN_ID="$(
            gh run list \
              --workflow bench.yml \
              --branch main \
              --status success \
              --limit 50 \
              --json databaseId \
              --jq '.[].databaseId' |
            while IFS= read -r candidate_run_id; do
              artifact_id="$(gh api \
                "repos/${{ github.repository }}/actions/runs/${candidate_run_id}/artifacts" \
                --jq '.artifacts[]? | select(.name == "bench-results-merged" and .expired == false) | .id' |
                head -n 1)"

              if [[ -n "$artifact_id" ]]; then
                echo "$candidate_run_id"
                break
              fi
            done
          )"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          if [[ -n "$RUN_ID" ]]; then
            echo "Latest benchmark run with merged artifact: ${RUN_ID}"
          else
            echo "No recent successful benchmark run has a bench-results-merged artifact."
          fi
        continue-on-error: true

      - name: Download latest benchmark data from GitHub artifact
        if: ${{ steps.latest-benchmark.outputs.run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: bench-results-merged
          path: artifacts
          run-id: ${{ steps.latest-benchmark.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Prepare benchmark data for website
        run: |
          snapshot="crates/tsz-website/bench-snapshot.json"
          if [[ -f artifacts/bench-results.json && -f "${snapshot}" ]]; then
            artifact_generated="$(jq -r '.generated_at // ""' artifacts/bench-results.json 2>/dev/null || echo "")"
            snapshot_generated="$(jq -r '.generated_at // ""' "${snapshot}" 2>/dev/null || echo "")"
            if [[ -n "${snapshot_generated}" && "${snapshot_generated}" > "${artifact_generated}" ]]; then
              echo "Repository benchmark snapshot (${snapshot_generated}) is newer than GitHub artifact (${artifact_generated:-unknown}); using snapshot."
              rm -f artifacts/bench-results.json
            fi
          fi

          if [[ ! -f artifacts/bench-results.json ]]; then
            echo "No benchmark artifact downloaded; bench charts will use repository/local fallback data."
            exit 0
          fi

          rows=$(jq '[.results[]?] | length' artifacts/bench-results.json 2>/dev/null || echo "0")
          timed_rows=$(jq '[.results[]? | select(.tsz_ms > 0 and .tsgo_ms > 0)] | length' artifacts/bench-results.json 2>/dev/null || echo "0")
          if [[ "${rows}" -gt 0 ]]; then
            mv artifacts/bench-results.json artifacts/bench-vs-tsgo-github-latest.json
            echo "Prepared ${rows} benchmark rows from GitHub Actions artifact (${timed_rows} with timing pairs)."
          else
            rm -f artifacts/bench-results.json
            echo "GitHub benchmark artifact has no result rows; skipping bench charts."
          fi
        continue-on-error: true

      - name: Download latest suite metrics from GCS
        run: |
          BUCKET="thirdface-ai-oauth_cloudbuild"
          TOKEN=$(gcloud auth print-access-token 2>/dev/null || echo "")

          if [[ -z "$TOKEN" ]]; then
            echo "No OAuth token — GCP auth step may have failed or secret is missing"
            exit 0
          fi

          mkdir -p .ci-metrics
          for suite in conformance emit fourslash; do
            OBJECT="tsz-ci-cache/metrics/latest/${suite}.json"
            URL="https://storage.googleapis.com/storage/v1/b/${BUCKET}/o/${OBJECT//\//%2F}?alt=media"
            out=".ci-metrics/${suite}.json"
            HTTP=$(curl -s -w "\n%{http_code}" -o "$out.tmp" \
              -H "Authorization: Bearer ${TOKEN}" "$URL")
            STATUS=$(echo "$HTTP" | tail -1)
            if [[ "$STATUS" == "200" ]] && jq -e type "$out.tmp" >/dev/null 2>&1; then
              mv "$out.tmp" "$out"
              echo "Downloaded latest ${suite} metrics"
            else
              rm -f "$out.tmp"
              echo "No latest ${suite} metrics from GCS (HTTP ${STATUS}); website will use repository snapshot/README fallback"
            fi
          done
        continue-on-error: true

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: wasm-web
          path: pkg/web
        continue-on-error: true

      - name: Install dependencies
        run: cd crates/tsz-website && npm install

      - name: Build website
        run: cd crates/tsz-website && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/tsz-website/dist

  deploy:
    needs: build
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
