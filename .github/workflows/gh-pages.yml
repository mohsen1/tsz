name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/architecture.html'
      - 'AGENTS.md'
      - 'README.md'
      - '.github/workflows/gh-pages.yml'
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.diff.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last deploy
        id: diff
        run: |
          # Always deploy for non-schedule triggers
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For schedule: check if there are new commits in the last 25 hours
          if git log --since="25 hours ago" --oneline | grep -q .; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes since last deploy, skipping"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  benchmark:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install hyperfine
        run: |
          wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i hyperfine_1.18.0_amd64.deb

      - name: Run benchmarks
        run: ./scripts/bench-vs-tsgo.sh --json

      - name: Upload benchmark data
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          path: artifacts/bench-vs-tsgo-*.json
          retention-days: 7

  wasm:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (bundler target)
        run: |
          cp LICENSE.txt crates/tsz-wasm/LICENSE.txt
          wasm-pack build crates/tsz-wasm --target bundler --out-dir ../../pkg/bundler

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bundler
          path: pkg/bundler/
          retention-days: 7

  build:
    needs: [check, benchmark, wasm]
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Download latest CI metrics if triggered by CI workflow
      - name: Download CI metrics
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: ci-metrics-*
          merge-multiple: true
          path: .ci-metrics
        continue-on-error: true

      - name: Download benchmark data
        uses: actions/download-artifact@v4
        with:
          name: benchmark-data
          path: website/data
        continue-on-error: true

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: wasm-bundler
          path: pkg/bundler
        continue-on-error: true

      # Rename to expected filename
      - name: Prepare benchmark data
        run: |
          if ls website/data/bench-vs-tsgo-*.json 1>/dev/null 2>&1; then
            mv website/data/bench-vs-tsgo-*.json website/data/benchmarks.json
            echo "Benchmark data ready"
          else
            echo "No benchmark data available"
          fi

      - name: Install dependencies
        run: cd website && npm install

      - name: Build website
        run: cd website && node build.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
