name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'crates/tsz-website/**'
      - 'docs/**/*.md'
      - 'docs/architecture.html'
      - 'AGENTS.md'
      - '.github/workflows/gh-pages.yml'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Never cancel an in-flight deploy — the check job skips if one is already
  # running so we don't queue up stale work.
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.diff.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if another deploy is already running
        id: in_flight
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IN_FLIGHT=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/gh-pages.yml/runs?status=in_progress&per_page=20" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})] | length")
          QUEUED=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/gh-pages.yml/runs?status=queued&per_page=20" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }} and .id < ${{ github.run_id }})] | length")
          BUSY=$((IN_FLIGHT + QUEUED))
          echo "Other deploy runs in_progress=${IN_FLIGHT} queued_before_us=${QUEUED}"
          if [ "$BUSY" -gt 0 ]; then
            echo "another deploy is busy — skipping this trigger"
            echo "in_flight=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_flight=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for changes since last deploy
        id: diff
        run: |
          if [ "${{ steps.in_flight.outputs.in_flight }}" = "true" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git log --since="25 hours ago" --oneline | grep -q .; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes since last deploy, skipping"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  wasm:
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (via binaryen)
        run: sudo apt-get install -y binaryen

      - name: Build WASM (web target)
        run: |
          cp LICENSE.txt crates/tsz-wasm/LICENSE.txt
          # wasm-opt currently produces a web build that fails during
          # __wbindgen_init_externref_table in the playground runtime.
          wasm-pack build crates/tsz-wasm --target web --out-dir ../../pkg/web --no-opt

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-web
          path: pkg/web/
          retention-days: 7

  build:
    needs: [check, wasm]
    if: ${{ always() && needs.check.outputs.should_deploy == 'true' && !cancelled() && needs.wasm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Benchmarks now run on Cloud Build (c3-88, 88 vCPU) via cloudbuild-bench.yaml
      # and publish results to GCS. We download the latest result here so the site
      # always deploys immediately without waiting for a benchmark run.
      - name: Download latest benchmark data from GCS
        env:
          SCCACHE_GCS_KEY_JSON: ${{ secrets.SCCACHE_GCS_KEY_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${SCCACHE_GCS_KEY_JSON:-}" ]]; then
            echo "No GCS credentials — using checked-in benchmark data"
            exit 0
          fi
          printf '%s' "$SCCACHE_GCS_KEY_JSON" > /tmp/gcs-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcs-key.json
          LATEST=gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache/bench-runs/latest.json
          if gsutil -q stat "$LATEST" 2>/dev/null; then
            gsutil cp "$LATEST" crates/tsz-website/data/benchmarks.json
            echo "Downloaded fresh benchmark data from GCS ($(date -u))"
          else
            echo "No latest.json in GCS yet — using checked-in benchmark data"
          fi
          rm -f /tmp/gcs-key.json
        continue-on-error: true

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: wasm-web
          path: pkg/web
        continue-on-error: true

      - name: Install dependencies
        run: cd crates/tsz-website && npm install

      - name: Build website
        run: cd crates/tsz-website && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/tsz-website/dist

  deploy:
    needs: build
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
