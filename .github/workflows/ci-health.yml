name: CI Health Check

on:
  schedule:
    # Every 15 minutes — uses free ubuntu-latest, not self-hosted runners
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  health:
    name: runner-health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check runner pool health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo="${{ github.repository }}"

          # Fetch runners (paginated). This endpoint requires repository
          # administration visibility; scheduled GITHUB_TOKEN probes may lack it.
          runner_api_error="${RUNNER_TEMP:-/tmp}/runner-api-error.log"
          runner_api_status=0
          runners=$(
            gh api "repos/${repo}/actions/runners" --paginate --jq '.runners[]' \
              2>"${runner_api_error}"
          ) || runner_api_status=$?

          if [[ "${runner_api_status}" -ne 0 ]]; then
            error_summary=$(tr '\n' ' ' < "${runner_api_error}" | sed 's/[[:space:]]\+/ /g' | cut -c1-240)
            {
              echo "## CI Health — $(date -u '+%Y-%m-%d %H:%M UTC')"
              echo ""
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Runner API probe | unavailable |"
              echo ""
              echo "> ⚠️ Runner pool metrics could not be read with this workflow token."
              if [[ -n "${error_summary}" ]]; then
                echo ""
                echo "> ${error_summary}"
              fi
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "::warning::runner pool probe unavailable; skipping runner-health failure"
            exit 0
          fi

          total=$(echo "$runners" | python3 -c "
          import json,sys
          r=[json.loads(l) for l in sys.stdin if l.strip()]
          print(len(r))
          ")
          online=$(echo "$runners" | python3 -c "
          import json,sys
          r=[json.loads(l) for l in sys.stdin if l.strip()]
          print(sum(1 for x in r if x.get('status')=='online'))
          ")
          busy=$(echo "$runners" | python3 -c "
          import json,sys
          r=[json.loads(l) for l in sys.stdin if l.strip()]
          print(sum(1 for x in r if x.get('status')=='online' and x.get('busy')))
          ")
          offline=$(echo "$runners" | python3 -c "
          import json,sys
          r=[json.loads(l) for l in sys.stdin if l.strip()]
          print(sum(1 for x in r if x.get('status')=='offline'))
          ")
          idle=$(( online - busy ))

          in_progress=$(gh api "repos/${repo}/actions/runs?status=in_progress&per_page=50" \
            --jq '.total_count' 2>/dev/null || echo 0)
          queued=$(gh api "repos/${repo}/actions/runs?status=queued&per_page=50" \
            --jq '.total_count' 2>/dev/null || echo 0)

          # Write GitHub step summary
          {
            echo "## CI Health — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Runners online | ${online} / ${total} |"
            echo "| Runners busy | ${busy} |"
            echo "| Runners idle | ${idle} |"
            echo "| Runners offline (stale) | ${offline} |"
            echo "| Workflow runs in progress | ${in_progress} |"
            echo "| Workflow runs queued | ${queued} |"

            if [[ "${idle}" -eq 0 && "${in_progress}" -gt 0 ]]; then
              echo ""
              echo "> ⚠️ **Runner pool saturated** — all runners busy, ${queued} run(s) queued"
            fi
            if [[ "${offline}" -gt 15 ]]; then
              echo ""
              echo "> ⚠️ **${offline} stale offline runners** — run \`scripts/ci/cleanup-stale-runners.sh\` to purge"
            fi
            if [[ "${online}" -lt 20 ]]; then
              echo ""
              echo "> 🔴 **Low runner count (${online})** — CREMA may not be scaling; check GCP console"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "runners: online=${online}/${total} busy=${busy} idle=${idle} offline=${offline}"
          echo "runs: in_progress=${in_progress} queued=${queued}"

          # Fail loudly when runner pool is critically low (blocks future jobs)
          if [[ "${online}" -lt 5 ]]; then
            echo "::error::CRITICAL: only ${online} runners online — CI is effectively down"
            exit 1
          fi

  dns:
    name: dns-health
    runs-on: ubuntu-latest
    steps:
      - name: Check tsz.dev DNS records (A + AAAA)
        run: |
          set -euo pipefail
          DOMAIN="tsz.dev"

          if ! command -v dig >/dev/null 2>&1; then
            echo "::error::dig is required for DNS health checks but was not found on the runner"
            exit 1
          fi

          A_RECORDS=$(dig +short A "$DOMAIN" || true)
          AAAA_RECORDS=$(dig +short AAAA "$DOMAIN" || true)

          A_COUNT=$(echo "$A_RECORDS" | grep -c '[0-9]' || true)
          AAAA_COUNT=$(echo "$AAAA_RECORDS" | grep -c ':' || true)

          {
            echo "## DNS Health — ${DOMAIN} — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Record | Status | Values |"
            echo "|--------|--------|--------|"
            if [[ "${A_COUNT}" -gt 0 ]]; then
              echo "| A (IPv4) | ✅ ${A_COUNT} record(s) | $(echo "$A_RECORDS" | tr '\n' ' ') |"
            else
              echo "| A (IPv4) | ❌ missing | — |"
            fi
            if [[ "${AAAA_COUNT}" -gt 0 ]]; then
              echo "| AAAA (IPv6) | ✅ ${AAAA_COUNT} record(s) | $(echo "$AAAA_RECORDS" | tr '\n' ' ') |"
            else
              echo "| AAAA (IPv6) | ⚠️ missing | — |"
              echo ""
              echo "> ⚠️ **No AAAA records found for ${DOMAIN}.**"
              echo "> Add the following GitHub Pages IPv6 addresses in Cloudflare DNS:"
              echo "> \`2606:50c0:8000::153\`, \`2606:50c0:8001::153\`, \`2606:50c0:8002::153\`, \`2606:50c0:8003::153\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "dns: A=${A_COUNT} AAAA=${AAAA_COUNT}"

          if [[ "${A_COUNT}" -eq 0 ]]; then
            echo "::error::CRITICAL: no A records for ${DOMAIN} — site is unreachable"
            exit 1
          fi
          if [[ "${AAAA_COUNT}" -eq 0 ]]; then
            echo "::warning::No AAAA records for ${DOMAIN} — IPv6 clients cannot reach the site (see issue #5098)"
          fi
