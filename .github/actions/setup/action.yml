name: 'Init TypeScript Submodule'
description: 'Initialises the TypeScript git submodule with caching. Must run after actions/checkout.'

runs:
  using: composite
  steps:
    - name: Cache TypeScript submodule
      uses: actions/cache@v4
      with:
        path: TypeScript
        key: ts-submodule-${{ hashFiles('.gitmodules') }}

    - name: Init TypeScript submodule
      shell: bash
      run: |
        git submodule update --init --depth 1 -- TypeScript
        test -f TypeScript/src/lib/es5.d.ts || { echo "ERROR: TypeScript lib files missing after submodule init"; exit 1; }
