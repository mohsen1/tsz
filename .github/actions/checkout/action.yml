name: 'Checkout with TypeScript submodule'
description: 'Checks out the repository and initialises the TypeScript git submodule (shallow).'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Init TypeScript submodule
      shell: bash
      run: |
        git submodule update --init --depth 1 -- TypeScript
        test -f TypeScript/src/lib/es5.d.ts || { echo "ERROR: TypeScript lib files missing after submodule init"; exit 1; }
