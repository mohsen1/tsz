# Cloud Build config for the `unit` job — runs on private pool
# `tsz-ci-build-pool` (e2-highcpu-32, 32 vCPU × 32 GiB, 200 GB SSD).
#
# Why: the Cloud Run worker pool used by GitHub Actions self-hosted runners
# caps at 8 vCPU × 32 GiB. The unit-suite compile is ~14 min on 8 vCPU and
# is gated by frontend-parse + LLVM codegen, both of which scale with cores.
# On 32 vCPU the same compile is ~4-5 min, cutting CI critical path by ~8 min.
#
# Cost: ~$0.024/min for e2-highcpu-32 in a private pool. Expected per-run cost
# at ~5 min total = $0.12/build. At 200 PR runs/day, ~$720/month. Within the
# $1k/month budget approved for the Cloud Build CI experiment.

steps:
  - id: unit-test
    name: rust:1
    entrypoint: bash
    env:
      # Use all available vCPUs. CARGO_BUILD_JOBS is workspace-wide.
      - 'CARGO_BUILD_JOBS=32'
      # CI gets fresh containers; nothing to gain from incremental fingerprints,
      # and they add their own non-determinism on multi-container builds.
      - 'CARGO_INCREMENTAL=0'
      # Mirror .cargo/config.toml [env] entry — solver/checker hit recursion
      # depths > the default 2 MiB stack on deeply nested TS test fixtures.
      - 'RUST_MIN_STACK=8388608'
      - 'CARGO_TERM_COLOR=always'
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

      # cargo-nextest binary install (no compile). Single ~7 MB download.
      curl -LsSf --retry 3 https://get.nexte.st/latest/linux \
        | tar -xz -C /usr/local/bin cargo-nextest

      cargo --version
      rustc --version
      cargo nextest --version

      # Run the same unit test set as scripts/ci/gcp-full-ci.sh `run_unit_tests`.
      # Profile ci-unit caps debug info to keep peak rustc RSS low; on this
      # bigger box memory isn't the constraint, but profile parity with the
      # Cloud Run flow keeps the binary outputs comparable.
      cargo nextest run \
        --profile ci \
        --cargo-profile ci-unit \
        --build-jobs 32 \
        -p tsz-common \
        -p tsz-scanner \
        -p tsz-parser \
        -p tsz-binder \
        -p tsz-solver \
        -p tsz-checker \
        -p tsz-emitter \
        -p tsz-lsp \
        -p tsz-core

options:
  pool:
    name: projects/tsz-ci/locations/us-central1/workerPools/tsz-ci-build-pool
  # Cloud Build private pools require CLOUD_LOGGING_ONLY (no Cloud Storage logs).
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
