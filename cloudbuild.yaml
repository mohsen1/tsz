steps:
  - id: restore-typescript
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

      ref="$(tr -d '[:space:]' < scripts/ci/typescript-submodule-ref)"
      cache_uri="${_TSZ_CI_CACHE_BUCKET}/typescript/${ref}.tar.gz"
      archive="/tmp/typescript-${ref}.tar.gz"

      rm -rf TypeScript
      if gsutil -q stat "$cache_uri"; then
        echo "TypeScript cache hit: ${cache_uri}"
        gsutil -q cp "$cache_uri" "$archive"
        tar --warning=no-unknown-keyword -xzf "$archive" -C .
      else
        echo "TypeScript cache miss: ${cache_uri}"
        if ! command -v curl >/dev/null 2>&1; then
          apt-get update -qq
          apt-get install -y --no-install-recommends ca-certificates curl
        fi
        mkdir -p TypeScript
        curl -fsSL "https://codeload.github.com/microsoft/TypeScript/tar.gz/${ref}" \
          -o "${archive}.upstream"
        tar -xzf "${archive}.upstream" -C TypeScript --strip-components=1
        echo "$ref" > TypeScript/.tsz-cache-ref
        tar -czf "$archive" TypeScript
        gsutil -q cp "$archive" "$cache_uri"
      fi

      test -f TypeScript/src/lib/es5.d.ts
      test "$(tr -d '[:space:]' < TypeScript/.tsz-cache-ref)" = "$ref"

  - id: full-ci
    name: rust:1.90-bookworm
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      scripts/ci/gcp-full-ci.sh "${_TSZ_CI_SUITE}"

options:
  pool:
    name: projects/thirdface-ai-oauth/locations/us-central1/workerPools/tsz-ci-c3-88
  logging: CLOUD_LOGGING_ONLY
  automapSubstitutions: true

substitutions:
  _TSZ_CI_CACHE_BUCKET: gs://thirdface-ai-oauth_cloudbuild/tsz-ci-cache
  _TSZ_CI_SUITE: all

timeout: 3600s
