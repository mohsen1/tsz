version: 2.1

# =============================================================================
# tsz — CircleCI pipeline (exploration)
# =============================================================================
# This config mirrors the GitHub Actions workflow in .github/workflows/ci.yml
# at a structural level:
#   - lint (fmt, clippy, architecture guardrails, crate root policy)
#   - per-crate test lanes (foundation, binder, solver, checker, emitter,
#     lsp, root), some sharded via `parallelism`
#   - wasm build
#   - test-build + test-build-server produce binaries once; conformance,
#     emit, and fourslash fan out via `parallelism` using those binaries
#     passed through a workspace (the GHA equivalent of upload-artifact +
#     download-artifact between jobs)
#
# Key differences vs GHA on purpose:
#   1) We use `resource_class: large` / `xlarge` for test and build jobs.
#      GHA free runners cap at 7 GB RAM / 4 vCPU, which is why the conformance
#      shards pin `--workers 2 --max-worker-rss-mb 1024`. CircleCI `xlarge`
#      (8 vCPU / 16 GB) and `2xlarge` (16 vCPU / 32 GB) let us raise those.
#   2) Parallelism is expressed natively via `parallelism: 10` and
#      `CIRCLE_NODE_INDEX` / `CIRCLE_NODE_TOTAL`, instead of a `matrix: shard`.
#      This replaces 10 matrix jobs with one job that spawns 10 executors.
#   3) Artifact handoff between jobs uses `persist_to_workspace` +
#      `attach_workspace` (which is the CircleCI idiom; faster than
#      upload-artifact since workspaces stream within the same pipeline).
#   4) Caching uses `save_cache` / `restore_cache` with a layered key.
#
# Shard counts were tuned down (2026-04-21) after observing ~40m wall-clock
# per pipeline dominated by queue-wait for containers. Free-tier concurrency
# can only service ~10-15 executors at a time, so halving shard counts cut
# queue time roughly in half without meaningfully slowing any single shard
# (each shard just processes ~2x the work it did before).
#
# What is NOT implemented in v1 (intentional; call out for follow-ups):
#   - Path filtering ("only run solver tests if solver changed"). Needs the
#     circleci/path-filtering orb + a setup workflow. Straightforward to add
#     once the shape is validated. For now every lane runs on every push.
#   - sccache. The mozilla-actions/sccache-action variant on GHA uses GH's
#     server-side cache backend. On CircleCI, sccache local mode would need
#     save_cache on a 5 GB dir across ~9 jobs per pipeline — that pushes
#     toward the free plan's data-transfer soft cap. The `.target` cache
#     already covers the common case (unchanged Cargo.lock). Revisit with
#     sccache-S3 or a minio side-car later if the numbers justify the setup.
#   - Cross-platform (macOS) lanes — all jobs here are linux/amd64.

# -----------------------------------------------------------------------------
# Executors
# -----------------------------------------------------------------------------
# cimg/rust includes a recent stable Rust + cargo + rustup + common build
# tools. `-node` variant also has Node.js, which the emit/fourslash lanes
# need for their JS harnesses.
executors:
  # Workspace uses edition = "2024" (stable since Rust 1.85); pin to a
  # version comfortably past that so cargo can parse the manifest.
  rust:
    docker:
      - image: cimg/rust:1.90
    resource_class: large              # 4 vCPU / 8 GB — fine for foundation
    working_directory: ~/tsz
  # xlarge/2xlarge require a paid plan tier; current account hits a resource
  # authorization failure ("Task information unavailable"/canceled) when
  # xlarge is requested, so we alias both heavy executors to `large` for now.
  # Re-introduce xlarge here once the plan allows it — that's where the real
  # wall-clock wins live (more cores for compile + higher RAM for conformance).
  rust-xl:
    docker:
      - image: cimg/rust:1.90
    resource_class: large
    working_directory: ~/tsz
  rust-node:
    docker:
      - image: cimg/rust:1.90-node
    resource_class: large
    working_directory: ~/tsz
  rust-node-xl:
    docker:
      - image: cimg/rust:1.90-node
    resource_class: large
    working_directory: ~/tsz

# -----------------------------------------------------------------------------
# Reusable command snippets
# -----------------------------------------------------------------------------
commands:
  init-typescript-submodule:
    description: "Initialise the TypeScript git submodule (mirrors .github/actions/setup)"
    steps:
      - restore_cache:
          name: Restore TypeScript submodule cache
          keys:
            - ts-submodule-v1-{{ checksum ".gitmodules" }}
      - run:
          name: Init TypeScript submodule
          command: |
            git submodule update --init --depth 1 -- TypeScript
            test -f TypeScript/src/lib/es5.d.ts || {
              echo "ERROR: TypeScript lib files missing after submodule init"; exit 1; }
      - save_cache:
          name: Save TypeScript submodule cache
          key: ts-submodule-v1-{{ checksum ".gitmodules" }}
          paths:
            - TypeScript
            - .git/modules/TypeScript

  restore-cargo-cache:
    description: "Restore cargo registry + .target cache"
    parameters:
      prefix:
        type: string
        default: "cargo"
    steps:
      - restore_cache:
          keys:
            - << parameters.prefix >>-v1-{{ checksum "Cargo.lock" }}
            - << parameters.prefix >>-v1-

  save-cargo-cache:
    description: "Save cargo registry + .target cache"
    parameters:
      prefix:
        type: string
        default: "cargo"
    steps:
      - save_cache:
          key: << parameters.prefix >>-v1-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - .target

  install-nextest:
    description: "Install cargo-nextest (cached by binary)"
    steps:
      - restore_cache:
          keys:
            - nextest-v1-linux-amd64
      - run:
          name: Install nextest
          command: |
            if ! command -v cargo-nextest >/dev/null 2>&1; then
              mkdir -p ~/.cargo/bin
              curl -LsSf https://get.nexte.st/latest/linux | tar -xzf - -C ~/.cargo/bin
            fi
            cargo-nextest --version
      - save_cache:
          key: nextest-v1-linux-amd64
          paths:
            - ~/.cargo/bin/cargo-nextest

# -----------------------------------------------------------------------------
# Jobs
# -----------------------------------------------------------------------------
jobs:

  # ---- Lint (fmt, clippy, arch guardrails) ---------------------------------
  lint:
    executor: rust
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-lint
      - run:
          name: rustup components
          command: rustup component add clippy rustfmt
      - run:
          name: cargo fmt --check
          command: cargo fmt --check
      - run:
          name: Validate workspace metadata
          command: scripts/arch/check-workspace-metadata.sh
      - run:
          name: Check crate root file policy
          command: scripts/check-crate-root-files.sh
      - run:
          name: clippy (deny warnings)
          command: |
            cargo clippy \
              -p tsz-common -p tsz-scanner -p tsz-parser -p tsz-binder \
              -p tsz-solver -p tsz-checker -p tsz-emitter -p tsz-lowering -p tsz-lsp \
              --all-targets -- -D warnings
      - run:
          name: Checker boundary guardrail
          command: |
            mkdir -p target/architecture-reports
            scripts/arch/check-checker-boundaries.sh
            cp artifacts/architecture/arch_guard_report.json target/architecture-reports/arch-guard.json
            cp artifacts/architecture/arch_guard_report.md target/architecture-reports/arch-guard.md
      - store_artifacts:
          path: target/architecture-reports
          destination: architecture-guard-report
      - save-cargo-cache:
          prefix: cargo-lint

  # ---- Foundation tests (common, scanner, parser) --------------------------
  test-foundation:
    executor: rust
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-common
          command: cargo nextest run --profile ci -p tsz-common
      - run:
          name: Test tsz-scanner
          # `|| [ $? -eq 4 ]` mirrors the GHA workflow: exit 4 == "no tests run"
          command: cargo nextest run --profile ci -p tsz-scanner || [ $? -eq 4 ]
      - run:
          name: Test tsz-parser
          command: cargo nextest run --profile ci -p tsz-parser
      - save-cargo-cache:
          prefix: cargo-test

  # ---- Binder tests --------------------------------------------------------
  test-binder:
    executor: rust
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-binder
          command: cargo nextest run --profile ci -p tsz-binder
      - save-cargo-cache:
          prefix: cargo-test

  # ---- Solver tests (largest crate — xlarge runner) ------------------------
  test-solver:
    executor: rust-xl
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-solver
          command: cargo nextest run --profile ci -p tsz-solver
      - save-cargo-cache:
          prefix: cargo-test

  # ---- Checker tests (2-way sharded — use native parallelism) --------------
  test-checker:
    executor: rust-xl
    parallelism: 2
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-checker (shard ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL})
          command: |
            SHARD=$((CIRCLE_NODE_INDEX + 1))
            cargo nextest run --profile ci -p tsz-checker \
              --partition hash:${SHARD}/${CIRCLE_NODE_TOTAL}
      - save-cargo-cache:
          prefix: cargo-test

  # ---- Emitter tests -------------------------------------------------------
  test-emitter:
    executor: rust
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-emitter
          command: cargo nextest run --profile ci -p tsz-emitter || [ $? -eq 4 ]
      - save-cargo-cache:
          prefix: cargo-test

  # ---- LSP tests (2-way sharded) -------------------------------------------
  test-lsp:
    executor: rust
    parallelism: 2
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-lsp (shard ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL})
          command: |
            SHARD=$((CIRCLE_NODE_INDEX + 1))
            cargo nextest run --profile ci -p tsz-lsp \
              --partition hash:${SHARD}/${CIRCLE_NODE_TOTAL} || [ $? -eq 4 ]
      - save-cargo-cache:
          prefix: cargo-test

  # ---- Root / tsz-core integration tests (2-way sharded) -------------------
  test-root:
    executor: rust
    parallelism: 2
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-test
      - install-nextest
      - run:
          name: Test tsz-core (shard ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL})
          command: |
            SHARD=$((CIRCLE_NODE_INDEX + 1))
            cargo nextest run --profile ci -p tsz-core \
              --partition hash:${SHARD}/${CIRCLE_NODE_TOTAL}
      - save-cargo-cache:
          prefix: cargo-test

  # ---- WASM build ----------------------------------------------------------
  wasm-build:
    executor: rust-node
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-wasm
      - run:
          name: Install wasm toolchain
          command: |
            rustup target add wasm32-unknown-unknown
            if ! command -v wasm-pack >/dev/null 2>&1; then
              curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
            fi
            sudo apt-get update -y && sudo apt-get install -y binaryen
      - run:
          name: Build WASM (nodejs target)
          command: |
            cd crates/tsz-wasm
            wasm-pack build --target nodejs --out-dir ../../pkg --no-opt
      - run:
          name: Copy lib files
          command: |
            mkdir -p pkg/lib
            cp -R TypeScript/src/lib/. pkg/lib/
      - store_artifacts:
          path: pkg
          destination: wasm-pkg
      - save-cargo-cache:
          prefix: cargo-wasm

  # ---- Build test binaries once (tsz, tsz-conformance) --------------------
  test-build:
    executor: rust-node-xl
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-testbuild
      - run:
          name: Build dist-fast binaries
          # Split into two explicit per-package commands. Combining them as
          # `-p tsz-cli --bin tsz -p tsz-conformance` in cargo 1.90 applied
          # the `--bin tsz` filter to every listed package, silently skipping
          # tsz-conformance (which has no bin named `tsz`) and breaking the
          # downstream conformance lane with "No such file or directory".
          command: |
            cargo build --profile dist-fast -p tsz-cli --bin tsz
            cargo build --profile dist-fast -p tsz-conformance --bin tsz-conformance
      - run:
          name: Verify binaries exist before persisting
          command: ls -l .target/dist-fast/tsz .target/dist-fast/tsz-conformance
      - run:
          name: Build emit runner JS
          command: |
            cd scripts
            npm install --silent
            cd emit
            npx tsc -p tsconfig.json
      - persist_to_workspace:
          root: .
          paths:
            - .target/dist-fast/tsz
            - .target/dist-fast/tsz-conformance
            - scripts/emit/dist
            - scripts/node_modules
      - save-cargo-cache:
          prefix: cargo-testbuild

  # ---- Build tsz-server (smaller, parallel to test-build) ------------------
  test-build-server:
    executor: rust-xl
    steps:
      - checkout
      - init-typescript-submodule
      - restore-cargo-cache:
          prefix: cargo-testbuild-server
      - run:
          name: Build tsz-server
          command: cargo build --profile dist-fast -p tsz-cli --bin tsz-server
      - persist_to_workspace:
          root: .
          paths:
            - .target/dist-fast/tsz-server
      - save-cargo-cache:
          prefix: cargo-testbuild-server

  # ---- Conformance (5-way parallelism; ingest prebuilt binaries) ----------
  conformance:
    executor: rust-node-xl               # xlarge lets us push workers > 2
    parallelism: 5
    steps:
      - checkout
      - init-typescript-submodule
      - attach_workspace:
          at: .
      - run:
          name: Make binaries executable
          command: chmod +x .target/dist-fast/tsz .target/dist-fast/tsz-conformance
      - run:
          name: Run conformance shard ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL}
          command: |
            set -euo pipefail
            # 5 shards × 2600 tests = 13,000 (covers the full suite with headroom).
            CHUNK=2600
            OFFSET=$(( CIRCLE_NODE_INDEX * CHUNK ))
            mkdir -p .ci-metrics
            TMPOUT=$(mktemp); CLEANOUT=$(mktemp)
            trap 'rm -f "$TMPOUT" "$CLEANOUT"' EXIT

            # `large` runner = 8 GB RAM; match the GHA settings (workers=2,
            # per-worker RSS=1024) until xlarge is unlocked on the plan.
            .target/dist-fast/tsz-conformance \
              --offset "$OFFSET" --max "$CHUNK" \
              --workers 2 --timeout 30 \
              --max-compilations-per-worker 50 \
              --max-worker-rss-mb 1024 \
              --cache-file scripts/conformance/tsc-cache-full.json \
              --print-test \
              2>&1 | tee "$TMPOUT" || true
            sed -E 's/\x1b\[[0-9;]*m//g' "$TMPOUT" > "$CLEANOUT"

            FINAL_LINE=$(grep -a "FINAL RESULTS:" "$CLEANOUT" | tail -1 || true)
            PASSED=$(echo "$FINAL_LINE" | sed -E 's/.*FINAL RESULTS:[[:space:]]*([0-9]+)\/([0-9]+) passed.*/\1/' || true)
            TOTAL=$(echo "$FINAL_LINE" | sed -E 's/.*FINAL RESULTS:[[:space:]]*([0-9]+)\/([0-9]+) passed.*/\2/' || true)

            printf '{"shard":%d,"passed":"%s","total":"%s"}\n' \
              "$CIRCLE_NODE_INDEX" "${PASSED:-0}" "${TOTAL:-0}" \
              > ".ci-metrics/shard-${CIRCLE_NODE_INDEX}.json"

            grep -aE '^(PASS|FAIL|CRASH|TIMEOUT) ' "$CLEANOUT" \
              > ".ci-metrics/shard-${CIRCLE_NODE_INDEX}-results.txt" || true
      - persist_to_workspace:
          root: .
          paths:
            - .ci-metrics
      - store_artifacts:
          path: .ci-metrics
          destination: conformance-shards

  # ---- Conformance aggregate ----------------------------------------------
  conformance-aggregate:
    executor: rust-node
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Aggregate conformance shards
          command: |
            set -euo pipefail
            sudo apt-get update -y && sudo apt-get install -y jq

            TOTAL_PASSED=0; TOTAL_TESTS=0; SHARD_COUNT=0
            for f in .ci-metrics/shard-*.json; do
              [ -f "$f" ] || continue
              P=$(jq -r '.passed' "$f"); T=$(jq -r '.total' "$f")
              TOTAL_PASSED=$((TOTAL_PASSED + P)); TOTAL_TESTS=$((TOTAL_TESTS + T))
              SHARD_COUNT=$((SHARD_COUNT + 1))
              echo "  $(basename "$f"): ${P}/${T}"
            done
            echo "Received results from ${SHARD_COUNT}/5 shards"

            [ "$SHARD_COUNT" -ge 4 ] || { echo "::error::too few shards reported"; exit 1; }
            [ "$TOTAL_TESTS" -gt 0 ] || { echo "::error::no tests ran"; exit 1; }

            RATE=$(awk "BEGIN {printf \"%.1f\", ($TOTAL_PASSED / $TOTAL_TESTS) * 100}")
            echo "Aggregate: ${TOTAL_PASSED}/${TOTAL_TESTS} passed (${RATE}%)"

            BASELINE=$(jq -r '.summary.passed // 0' scripts/conformance/conformance-snapshot.json)
            if [ -n "$BASELINE" ] && [ "$BASELINE" -gt 0 ]; then
              if [ "$TOTAL_PASSED" -lt "$BASELINE" ]; then
                echo "Conformance regression: ${TOTAL_PASSED} < ${BASELINE} passing tests"
                exit 1
              fi
              echo "Conformance OK: ${TOTAL_PASSED} >= ${BASELINE} passing tests"
            fi
      - store_artifacts:
          path: .ci-metrics
          destination: conformance-aggregate

  # ---- Emit (5-way parallelism) -------------------------------------------
  emit:
    executor: rust-node
    parallelism: 5
    steps:
      - checkout
      - init-typescript-submodule
      - attach_workspace:
          at: .
      - run:
          name: Make binary executable
          command: chmod +x .target/dist-fast/tsz
      - run:
          name: Run emit shard ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL}
          environment:
            TSZ_BIN: /home/circleci/tsz/.target/dist-fast/tsz
          command: |
            set -euo pipefail
            # 5 shards × 3800 = 19,000 (was 10 × 1900).
            CHUNK=3800
            OFFSET=$(( CIRCLE_NODE_INDEX * CHUNK ))
            mkdir -p .ci-metrics
            TMPOUT=$(mktemp); CLEANOUT=$(mktemp)
            trap 'rm -f "$TMPOUT" "$CLEANOUT"' EXIT

            ./scripts/emit/run.sh --skip-build --max=$CHUNK --offset=$OFFSET 2>&1 | tee "$TMPOUT" || true
            sed -E 's/\x1b\[[0-9;]*m//g' "$TMPOUT" > "$CLEANOUT"

            JS_LINE=$(grep "Pass Rate:" "$CLEANOUT" | sed -n '1p' || true)
            DTS_LINE=$(grep "Pass Rate:" "$CLEANOUT" | sed -n '2p' || true)
            JS_COUNTS=$(echo "$JS_LINE" | grep -oE '\([0-9]+/[0-9]+\)' | tr -d '()' || true)
            DTS_COUNTS=$(echo "$DTS_LINE" | grep -oE '\([0-9]+/[0-9]+\)' | tr -d '()' || true)
            JS_P=$(echo "$JS_COUNTS" | cut -d/ -f1); JS_T=$(echo "$JS_COUNTS" | cut -d/ -f2)
            DTS_P=$(echo "$DTS_COUNTS" | cut -d/ -f1); DTS_T=$(echo "$DTS_COUNTS" | cut -d/ -f2)

            printf '{"shard":%d,"js_passed":"%s","js_total":"%s","dts_passed":"%s","dts_total":"%s"}\n' \
              "$CIRCLE_NODE_INDEX" "${JS_P:-0}" "${JS_T:-0}" "${DTS_P:-0}" "${DTS_T:-0}" \
              > ".ci-metrics/emit-shard-${CIRCLE_NODE_INDEX}.json"
      - persist_to_workspace:
          root: .
          paths:
            - .ci-metrics

  # ---- Fourslash (10-way parallelism) -------------------------------------
  fourslash:
    executor: rust-node
    parallelism: 10
    steps:
      - checkout
      - init-typescript-submodule
      - attach_workspace:
          at: .
      - run:
          name: Prep tsz-server
          command: |
            chmod +x .target/dist-fast/tsz-server
            mkdir -p .target/release
            ln -sf "$PWD/.target/dist-fast/tsz-server" .target/release/tsz-server
      - restore_cache:
          keys:
            - fourslash-v1-{{ checksum "scripts/fourslash/package-lock.json" }}-{{ checksum "TypeScript/package-lock.json" }}
            - fourslash-v1-
      - run:
          name: Run fourslash shard ${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL}
          command: |
            set -euo pipefail
            mkdir -p .ci-metrics
            TMPOUT=$(mktemp); CLEANOUT=$(mktemp)
            trap 'rm -f "$TMPOUT" "$CLEANOUT"' EXIT

            ./scripts/fourslash/run-fourslash.sh \
              --skip-cargo-build \
              --shard=${CIRCLE_NODE_INDEX}/${CIRCLE_NODE_TOTAL} \
              --workers=2 --memory-limit=512 2>&1 | tee "$TMPOUT" || true
            sed -E 's/\x1b\[[0-9;]*m//g' "$TMPOUT" > "$CLEANOUT"

            RESULTS_LINE=$(grep "^Results:" "$CLEANOUT" | tail -1 || true)
            PASSED=$(echo "$RESULTS_LINE" | grep -oE 'Results:[[:space:]]*[0-9]+ passed' | grep -oE '[0-9]+' | head -1 || true)
            RAN=$(echo "$RESULTS_LINE" | grep -oE 'out of [0-9]+' | grep -oE '[0-9]+' | head -1 || true)

            printf '{"shard":%d,"passed":"%s","total":"%s"}\n' \
              "$CIRCLE_NODE_INDEX" "${PASSED:-0}" "${RAN:-0}" \
              > ".ci-metrics/fourslash-shard-${CIRCLE_NODE_INDEX}.json"
      - save_cache:
          key: fourslash-v1-{{ checksum "scripts/fourslash/package-lock.json" }}-{{ checksum "TypeScript/package-lock.json" }}
          paths:
            - scripts/fourslash/node_modules
            - TypeScript/node_modules
            - TypeScript/built/local
      - persist_to_workspace:
          root: .
          paths:
            - .ci-metrics

# -----------------------------------------------------------------------------
# Workflow
# -----------------------------------------------------------------------------
workflows:
  ci:
    jobs:
      # Fast lanes run immediately
      - lint
      - test-foundation
      - test-binder
      - test-solver
      - test-checker
      - test-emitter
      - test-lsp
      - test-root
      - wasm-build

      # Build once, fan out
      - test-build
      - test-build-server

      - conformance:
          requires: [test-build]
      - conformance-aggregate:
          requires: [conformance]

      - emit:
          requires: [test-build]

      - fourslash:
          requires: [test-build-server]
