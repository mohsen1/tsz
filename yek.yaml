# Yek configuration for tsz (TypeScript compiler in Rust)
# This focuses on important source code files, excluding tests

# Token limit for LLM context
tokens: "900k"

# Ignore patterns (extends .gitignore)
ignore_patterns:
  - "**/tests/**"
  - "**/*_tests.rs"
  - "**/benches/**"
  - "TypeScript/**"
  - "node_modules/**"
  - "crates/tsz-core/src/test_harness.rs"
  - "docs/*"
  - "**/*debug*.rs"
  - "LICENSE.txt"
  - "target/**"
  - "docs/specs/**"
  - ".github/**"
  - "scripts/**"
  - "pkg/**"
  - "*.wasm"
  - "*.lock"

# Priority rules - higher scores are prioritized (appear later in output)
priority_rules:
  # Core type checking and solving (most important)
  - score: 100
    pattern: "^crates/tsz-(checker|binder)/src/state\\.rs$|^crates/tsz-binder/src/lib\\.rs$|^crates/tsz-lowering/src/"
  - score: 95
    pattern: "^crates/tsz-(checker|solver)/src/"

  # Parser and scanner
  - score: 90
    pattern: "^crates/tsz-(scanner|parser)/src/lib\\.rs$|^crates/tsz-parser/src/state\\.rs$"
  - score: 85
    pattern: "^crates/tsz-(parser|scanner)/src/"

  # Emitter and code generation
  - score: 80
    pattern: "^crates/tsz-emitter/src/(declaration_emitter|source_writer|source_map|emit_context|printer)\\.rs$"
  - score: 75
    pattern: "^crates/tsz-emitter/src/"
  - score: 70
    pattern: "^crates/tsz-lowering/src/transforms/"

  # LSP and CLI
  - score: 60
    pattern: "^crates/tsz-(lsp|cli)/src/"

  # Core infrastructure
  - score: 50
    pattern: "^crates/tsz-common/src/|^crates/tsz-core/src/"

  # Documentation
  - score: 40
    pattern: "^PROJECT_DIRECTION\\.md$"
  - score: 30
    pattern: "^\\.(md|txt)$"

# Binary extensions to ignore (in addition to built-in list)
binary_extensions:
  - ".wasm"
  - ".png"
  - ".jpg"
  - ".jpeg"
  - ".gif"
  - ".ico"
  - ".pdf"

# Git history priority boost (lower = less emphasis on git recency)
git_boost_max: 30

# Output options
line_numbers: true
tree_header: true
